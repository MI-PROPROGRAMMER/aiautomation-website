<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Equipment rental idle days on GC jobs visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="useful" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="idle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5e8aa6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0a3a66" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500" /><path d="M0 380 H1500" /><path d="M0 540 H1500" />
    <path d="M0 700 H1500" /><path d="M0 860 H1500" />
  </g>

  <g transform="translate(150,230)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="80" font-weight="700" fill="#ffffff">Equipment Rental Returns:</text>
    <text y="184" font-size="80" font-weight="700" fill="#ffffff">Where GCs Burn Idle Time</text>
    <text y="252" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">billed days the equipment stopped earning</text>
  </g>

  <g transform="translate(150,610)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">A SINGLE RENTAL ON A MID-SIZE GC JOB · 30 BILLED DAYS</text>

    <g transform="translate(0,60)">
      <text x="0" y="0" font-size="16" fill="#9fc4dc">MANUAL TRACKING</text>
      <rect x="240" y="-18" width="950" height="26" fill="#0a3a66" opacity="0.55" rx="2"/>
      <rect x="240" y="-18" width="540" height="26" fill="url(#useful)" rx="2"/>
      <rect x="780" y="-18" width="410" height="26" fill="url(#idle)" rx="2"/>
      <text x="430" y="-26" font-size="14" fill="#cfe5f1" text-anchor="middle">useful 17d</text>
      <text x="985" y="-26" font-size="14" fill="#7fb6d6" text-anchor="middle">idle 13d (return lag)</text>
      <text x="1210" y="2" font-size="16" fill="#cfe5f1">~43% idle</text>
    </g>

    <g transform="translate(0,150)">
      <text x="0" y="0" font-size="16" fill="#9fc4dc">AI-AUGMENTED</text>
      <rect x="240" y="-18" width="950" height="26" fill="#0a3a66" opacity="0.55" rx="2"/>
      <rect x="240" y="-18" width="855" height="26" fill="url(#useful)" rx="2"/>
      <rect x="1095" y="-18" width="95" height="26" fill="url(#idle)" rx="2"/>
      <text x="667" y="-26" font-size="14" fill="#cfe5f1" text-anchor="middle">useful 17d, redeployed early</text>
      <text x="1142" y="-26" font-size="14" fill="#7fb6d6" text-anchor="middle">2d lag</text>
      <text x="1210" y="2" font-size="16" fill="#cfe5f1">~10% idle</text>
    </g>

    <g transform="translate(0,230)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">IDLE DAYS ARE BAKED INTO JOB COST BEFORE FINANCE SEES THEM</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
