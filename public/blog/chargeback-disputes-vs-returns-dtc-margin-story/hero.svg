<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Chargeback disputes vs returns: a side-by-side cost stack for a DTC brand">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="returnFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fb6d6"/>
      <stop offset="1" stop-color="#5e8aa6"/>
    </linearGradient>
    <linearGradient id="chargebackFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#0a3a66"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.32">
    <path d="M0 240 H1500"/>
    <path d="M0 420 H1500"/>
    <path d="M0 600 H1500"/>
    <path d="M0 780 H1500"/>
  </g>

  <g transform="translate(150,205)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="78" font-weight="700" fill="#ffffff">Chargeback Disputes</text>
    <text y="186" font-size="78" font-weight="700" fill="#ffffff">vs Returns</text>
    <text y="252" font-size="34" font-weight="400" fill="#cfe5f1" opacity="0.9">the DTC margin story behind the same refund</text>
  </g>

  <g transform="translate(540,540)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">COST STACK PER REFUND, ILLUSTRATIVE $90 ORDER</text>

    <g transform="translate(0,40)">
      <line x1="0" y1="280" x2="540" y2="280" stroke="#5e8aa6" stroke-width="1" opacity="0.6"/>

      <g transform="translate(40,0)">
        <rect x="0" y="190" width="160" height="90" fill="url(#returnFill)" opacity="0.95"/>
        <rect x="0" y="180" width="160" height="10" fill="#cfe5f1" opacity="0.9"/>
        <text x="80" y="310" font-size="16" letter-spacing="3" fill="#cfe5f1" text-anchor="middle">RETURN</text>
        <text x="80" y="334" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">~$95</text>

        <g font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#cfe5f1">
          <text x="172" y="240">refund</text>
          <text x="172" y="190">labor</text>
        </g>
      </g>

      <g transform="translate(340,0)">
        <rect x="0" y="190" width="160" height="90" fill="url(#chargebackFill)" opacity="0.95"/>
        <rect x="0" y="160" width="160" height="30" fill="#0a3a66" stroke="#00B5E2" stroke-width="0.8"/>
        <rect x="0" y="125" width="160" height="35" fill="#063055" stroke="#00B5E2" stroke-width="0.8"/>
        <rect x="0" y="100" width="160" height="25" fill="#04274a" stroke="#00B5E2" stroke-width="0.8"/>
        <rect x="0" y="70" width="160" height="30" fill="#031f3c" stroke="#00B5E2" stroke-width="0.8"/>
        <text x="80" y="310" font-size="16" letter-spacing="3" fill="#00B5E2" text-anchor="middle">CHARGEBACK</text>
        <text x="80" y="334" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">~$210</text>

        <g font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#cfe5f1">
          <text x="172" y="240">refund</text>
          <text x="172" y="180">processor fee</text>
          <text x="172" y="148">inventory</text>
          <text x="172" y="118">response labor</text>
          <text x="172" y="90">monitoring risk</text>
        </g>
      </g>

      <g transform="translate(60,30)" font-size="11" fill="#7fb6d6" letter-spacing="2">
        <text x="0" y="0">SAME REFUND</text>
      </g>
      <g transform="translate(360,30)" font-size="11" fill="#00B5E2" letter-spacing="2">
        <text x="0" y="0">+ FEE + STOCK + RISK</text>
      </g>
    </g>
  </g>

  <g transform="translate(150,860)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="12" letter-spacing="2" fill="#5e8aa6">A REFUND IS NOT A REFUND. THE PATH THE MONEY TAKES BACK DECIDES WHAT IT REALLY COSTS THE BRAND.</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
