<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Field PO Leakage visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.2" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="visibleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#5e8aa6"/>
    </linearGradient>
    <linearGradient id="overrunBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500"/><path d="M0 380 H1500"/><path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/><path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,235)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Field PO Leakage</text>
    <text y="170" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">where GC job-cost variance hides in plain sight</text>
  </g>

  <g font-family="Georgia, serif">
    <text x="180" y="525" font-size="14" letter-spacing="3" fill="#7fb6d6">BUYOUT VERSUS WHAT IS ACTUALLY COMMITTED</text>

    <g stroke="#5e8aa6" stroke-width="1" stroke-dasharray="4 6" opacity="0.7">
      <line x1="1180" y1="555" x2="1180" y2="720"/>
    </g>
    <text x="1180" y="548" font-size="13" letter-spacing="2" fill="#cfe5f1" text-anchor="middle">BUYOUT TARGET</text>

    <g transform="translate(180,575)">
      <text font-size="14" fill="#9fc4dc">VISIBLE IN COST REPORT</text>
      <text y="22" font-size="12" fill="#7fb6d6" opacity="0.85">formal POs through requisition flow</text>
      <rect x="380" y="-8" width="800" height="36" fill="#0a3a66" opacity="0.55"/>
      <rect x="380" y="-8" width="800" height="36" fill="url(#visibleBar)"/>
      <text x="1198" y="16" font-size="13" fill="#cfe5f1">tracked</text>
    </g>

    <g transform="translate(180,650)">
      <text font-size="14" fill="#9fc4dc">ACTUALLY COMMITTED</text>
      <text y="22" font-size="12" fill="#7fb6d6" opacity="0.85">formal POs plus untracked field calls</text>
      <rect x="380" y="-8" width="800" height="36" fill="#0a3a66" opacity="0.55"/>
      <rect x="380" y="-8" width="800" height="36" fill="url(#visibleBar)"/>
      <rect x="1180" y="-8" width="120" height="36" fill="url(#overrunBar)"/>
      <text x="1316" y="16" font-size="13" fill="#00B5E2">field PO leak</text>
    </g>

    <g transform="translate(180,770)">
      <text font-size="14" letter-spacing="3" fill="#7fb6d6">WHEN THE PM ACTUALLY SEES THE SPEND</text>

      <g stroke="#0a3a66" stroke-width="1">
        <line x1="0" y1="50" x2="1140" y2="50"/>
      </g>

      <g stroke="#5e8aa6" stroke-width="1">
        <line x1="0"    y1="42" x2="0"    y2="60"/>
        <line x1="285"  y1="42" x2="285"  y2="60"/>
        <line x1="855"  y1="42" x2="855"  y2="60"/>
        <line x1="1140" y1="42" x2="1140" y2="60"/>
      </g>

      <g font-size="13" fill="#9fc4dc" letter-spacing="1.5" text-anchor="middle">
        <text x="0"    y="84">DAY 0</text>
        <text x="285"  y="84">DAY 7</text>
        <text x="855"  y="84">DAY 30</text>
        <text x="1140" y="84">DAY 45</text>
      </g>

      <g font-size="13" fill="#cfe5f1" text-anchor="middle">
        <text x="0"    y="28" font-weight="700" fill="#ffffff">SUPER ORDERS</text>
        <text x="285"  y="28" font-weight="700" fill="#00B5E2">AI LAYER SURFACES</text>
        <text x="855"  y="28" font-weight="700" fill="#ffffff">INVOICE POSTS</text>
        <text x="1140" y="28" font-weight="700" fill="#ffffff">MANUAL DISCOVERY</text>
      </g>

      <g>
        <circle cx="0"    cy="50" r="9" fill="#00B5E2"/>
        <circle cx="285"  cy="50" r="9" fill="#00B5E2"/>
        <circle cx="855"  cy="50" r="9" fill="#cfe5f1"/>
        <circle cx="1140" cy="50" r="11" fill="none" stroke="#cfe5f1" stroke-width="3"/>
      </g>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
