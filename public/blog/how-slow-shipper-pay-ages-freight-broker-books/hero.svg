<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Trend chart showing freight broker AR aging as shipper days-to-pay drift wider than carrier days-to-pay">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="fillGap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 240 H1500"/>
    <path d="M0 420 H1500"/>
    <path d="M0 600 H1500"/>
    <path d="M0 780 H1500"/>
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.9">THE JOURNAL</text>
    <text y="88" font-size="84" font-weight="700" fill="#ffffff">Slow Shipper Pay</text>
    <text y="176" font-size="40" font-weight="400" fill="#cfe5f1" opacity="0.9">how AR ages on a freight broker's books</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">DAYS TO PAY  ·  ILLUSTRATIVE 12-MONTH TREND</text>

    <g font-size="14" fill="#5e8aa6" text-anchor="end">
      <text x="90" y="52">60</text>
      <text x="90" y="112">45</text>
      <text x="90" y="172">30</text>
      <text x="90" y="232">15</text>
      <text x="90" y="292">0</text>
    </g>

    <g font-size="13" fill="#5e8aa6" text-anchor="middle" letter-spacing="1">
      <text x="180" y="315">Q1</text>
      <text x="410" y="315">Q2</text>
      <text x="640" y="315">Q3</text>
      <text x="870" y="315">Q4</text>
      <text x="1100" y="315">Q1</text>
    </g>

    <path d="M 120 292 L 180 288 L 300 278 L 410 268 L 520 255 L 640 240 L 760 220 L 870 202 L 990 182 L 1100 160 L 1100 292 L 120 292 Z"
          fill="url(#fillGap)"/>

    <path d="M 120 292 L 180 288 L 300 278 L 410 268 L 520 255 L 640 240 L 760 220 L 870 202 L 990 182 L 1100 160"
          fill="none" stroke="#00B5E2" stroke-width="3" stroke-linecap="round"/>

    <g fill="#00B5E2">
      <circle cx="180" cy="288" r="4"/>
      <circle cx="410" cy="268" r="4"/>
      <circle cx="640" cy="240" r="4"/>
      <circle cx="870" cy="202" r="4"/>
      <circle cx="1100" cy="160" r="6" stroke="#ffffff" stroke-width="2"/>
    </g>

    <path d="M 120 268 L 180 268 L 300 266 L 410 266 L 520 264 L 640 264 L 760 262 L 870 262 L 990 260 L 1100 260"
          fill="none" stroke="#5e8aa6" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6" opacity="0.85"/>

    <g fill="#5e8aa6">
      <circle cx="180" cy="268" r="4"/>
      <circle cx="410" cy="266" r="4"/>
      <circle cx="640" cy="264" r="4"/>
      <circle cx="870" cy="262" r="4"/>
      <circle cx="1100" cy="260" r="4"/>
    </g>

    <g font-size="15" font-family="Georgia, 'Times New Roman', serif">
      <text x="1130" y="164" fill="#ffffff" font-weight="700">Shipper pay  52 days</text>
      <text x="1130" y="264" fill="#cfe5f1" opacity="0.85">Carrier pay   7 days</text>
    </g>

    <line x1="1100" y1="168" x2="1100" y2="256" stroke="#00B5E2" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.75"/>
    <text x="1112" y="216" font-size="14" fill="#00B5E2" letter-spacing="2">45-DAY DELTA</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
