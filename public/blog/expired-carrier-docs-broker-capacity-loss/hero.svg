<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Expired carrier docs shrink broker capacity visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="lapsed" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="14" height="14" fill="#0a3a66"/>
      <rect width="7" height="14" fill="#12324f"/>
    </pattern>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500" /><path d="M0 360 H1500" /><path d="M0 520 H1500" />
    <path d="M0 680 H1500" /><path d="M0 840 H1500" />
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="80" font-weight="700" fill="#ffffff">Expired Carrier Docs</text>
    <text y="180" font-size="80" font-weight="700" fill="#ffffff">Cost Broker Capacity</text>
    <text y="240" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">what the vetted pool actually is on Monday</text>
  </g>

  <g transform="translate(180,580)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">USABLE CAPACITY VS FILE COUNT</text>

    <g transform="translate(0,50)">
      <text font-size="16" fill="#9fc4dc">CRM SHOWS</text>
      <rect x="220" y="-18" width="940" height="22" fill="#0a3a66"/>
      <rect x="220" y="-18" width="940" height="22" fill="#00B5E2" opacity="0.95"/>
      <text x="1180" y="0" font-size="18" fill="#ffffff" font-weight="600">500</text>
    </g>

    <g transform="translate(0,100)">
      <text font-size="16" fill="#9fc4dc">CURRENT COI</text>
      <rect x="220" y="-18" width="940" height="22" fill="url(#lapsed)"/>
      <rect x="220" y="-18" width="790" height="22" fill="#00B5E2" opacity="0.82"/>
      <text x="1180" y="0" font-size="18" fill="#cfe5f1">420</text>
    </g>

    <g transform="translate(0,150)">
      <text font-size="16" fill="#9fc4dc">ACTIVE AUTHORITY</text>
      <rect x="220" y="-18" width="940" height="22" fill="url(#lapsed)"/>
      <rect x="220" y="-18" width="884" height="22" fill="#00B5E2" opacity="0.72"/>
      <text x="1180" y="0" font-size="18" fill="#cfe5f1">470</text>
    </g>

    <g transform="translate(0,200)">
      <text font-size="16" fill="#9fc4dc">CURRENT W9</text>
      <rect x="220" y="-18" width="940" height="22" fill="url(#lapsed)"/>
      <rect x="220" y="-18" width="846" height="22" fill="#00B5E2" opacity="0.62"/>
      <text x="1180" y="0" font-size="18" fill="#cfe5f1">450</text>
    </g>

    <g transform="translate(0,255)">
      <text font-size="16" fill="#ffffff" font-weight="600">FULLY BOOKABLE</text>
      <rect x="220" y="-18" width="940" height="26" fill="url(#lapsed)"/>
      <rect x="220" y="-18" width="705" height="26" fill="#00B5E2" opacity="0.98"/>
      <rect x="220" y="-18" width="705" height="26" fill="#ffffff" opacity="0.06"/>
      <text x="1180" y="0" font-size="20" fill="#ffffff" font-weight="700">375</text>
    </g>

    <g transform="translate(0,315)">
      <text font-size="13" letter-spacing="2" fill="#5e8aa6">DIRECTIONAL RANGES · MID-SIZE BROKERAGE · WEEKLY DRIFT</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
