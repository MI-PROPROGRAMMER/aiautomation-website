<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a36"/>
      <stop offset="100%" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00B5E2" stop-opacity="1"/>
      <stop offset="85%" stop-color="#00B5E2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00B5E2" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>

  <text x="750" y="200" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" letter-spacing="6"
        fill="#00B5E2">THE JOURNAL</text>

  <text x="750" y="312" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="700"
        fill="#ffffff">Card-on-File Declines</text>
  <text x="750" y="400" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="700"
        fill="#ffffff">and DTC Subscription Churn</text>

  <text x="750" y="478" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-style="italic"
        fill="#cfe5f1" opacity="0.9">Where renewal revenue leaks, and what changes when retries</text>
  <text x="750" y="520" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-style="italic"
        fill="#cfe5f1" opacity="0.9">adapt to the customer instead of the calendar</text>

  <g transform="translate(220, 640)">
    <text x="0" y="-20"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="24" fill="#7fb6d6">Manual dunning</text>
    <rect x="0" y="0" width="440" height="64" fill="#0a3a66" rx="8"/>
    <rect x="0" y="0" width="132" height="64" fill="#7fb6d6" rx="8"/>
    <text x="148" y="44"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="30" font-weight="700" fill="#ffffff">~30%</text>
    <text x="0" y="108"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20" fill="#cfe5f1" opacity="0.7">recovery of failed renewals</text>
  </g>

  <g transform="translate(840, 640)">
    <text x="0" y="-20"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="24" fill="#00B5E2">AI-assisted dunning</text>
    <rect x="0" y="0" width="440" height="64" fill="#0a3a66" rx="8"/>
    <rect x="0" y="0" width="264" height="64" fill="url(#cyanFill)" rx="8"/>
    <text x="280" y="44"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="30" font-weight="700" fill="#ffffff">50–65%</text>
    <text x="0" y="108"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20" fill="#cfe5f1" opacity="0.7">recovery of failed renewals</text>
  </g>

  <text x="750" y="830" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" letter-spacing="3"
        fill="#5e8aa6">APEXIFYLABS  ·  AI FOR DTC OPS</text>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentBar)"/>
</svg>
