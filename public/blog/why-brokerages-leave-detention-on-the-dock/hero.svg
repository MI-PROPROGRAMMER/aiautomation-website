<svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#00B5E2"/>
      <stop offset="0.75" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barEarned" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#7fb6d6"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bgGrad)"/>

  <text x="750" y="200" text-anchor="middle" fill="#00B5E2" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="6" font-weight="500">THE JOURNAL</text>

  <text x="750" y="330" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700">Detention Left on the Dock</text>

  <text x="750" y="395" text-anchor="middle" fill="#cfe5f1" fill-opacity="0.9" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-style="italic">Why brokerages don't collect what they earn</text>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="26">
    <text x="380" y="540" text-anchor="end" fill="#cfe5f1" fill-opacity="0.9">Earned</text>
    <rect x="420" y="510" width="820" height="44" rx="3" fill="url(#barEarned)"/>
    <text x="1255" y="540" fill="#cfe5f1" fill-opacity="0.7" font-size="22" font-style="italic">on the load</text>

    <text x="380" y="660" text-anchor="end" fill="#cfe5f1" fill-opacity="0.9">Invoiced</text>
    <rect x="420" y="630" width="820" height="44" rx="3" fill="#0a3a66"/>
    <rect x="420" y="630" width="520" height="44" rx="3" fill="#5e8aa6"/>
    <text x="1255" y="660" fill="#cfe5f1" fill-opacity="0.7" font-size="22" font-style="italic">by the desk</text>

    <text x="380" y="780" text-anchor="end" fill="#cfe5f1" fill-opacity="0.9">Collected</text>
    <rect x="420" y="750" width="820" height="44" rx="3" fill="#0a3a66"/>
    <rect x="420" y="750" width="340" height="44" rx="3" fill="#7fb6d6"/>
    <text x="1255" y="780" fill="#cfe5f1" fill-opacity="0.7" font-size="22" font-style="italic">on the invoice</text>
  </g>

  <g stroke="#00B5E2" stroke-opacity="0.35" stroke-dasharray="6 8">
    <line x1="420" y1="500" x2="420" y2="810"/>
    <line x1="1240" y1="500" x2="1240" y2="810"/>
  </g>

  <text x="750" y="855" text-anchor="middle" fill="#7fb6d6" font-family="Georgia, serif" font-size="20" font-style="italic">The gap between earned and collected is the leak</text>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentBar)"/>
</svg>
