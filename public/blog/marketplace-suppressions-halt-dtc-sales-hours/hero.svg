<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Marketplace suppression detection lag visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gapFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.3">
    <path d="M0 240 H1500"/>
    <path d="M0 420 H1500"/>
    <path d="M0 600 H1500"/>
    <path d="M0 780 H1500"/>
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="96" font-size="76" font-weight="700" fill="#ffffff">Marketplace Suppression</text>
    <text y="164" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">the hours DTC brands lose before they notice</text>
  </g>

  <g transform="translate(180,540)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">SKU HOURLY SALES · SUPPRESSION EVENT AT 09:00</text>

    <g transform="translate(0,60)">
      <g stroke="#5e8aa6" stroke-width="1" opacity="0.5">
        <path d="M60 200 H1160"/>
        <path d="M60 40 V200"/>
      </g>

      <g fill="#7fb6d6" font-size="12" text-anchor="middle" opacity="0.75">
        <text x="60" y="222">06:00</text>
        <text x="243" y="222">09:00</text>
        <text x="427" y="222">12:00</text>
        <text x="610" y="222">15:00</text>
        <text x="793" y="222">18:00</text>
        <text x="977" y="222">21:00</text>
        <text x="1160" y="222">24:00</text>
      </g>

      <path d="M60 90 L150 82 L200 78 L243 80 L243 190 L1160 190" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.95"/>

      <path d="M243 80 L243 190 L610 190 L610 82 L243 80 Z" fill="url(#gapFill)"/>

      <g stroke="#00B5E2" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.85">
        <path d="M243 40 V200"/>
        <path d="M610 40 V200"/>
      </g>

      <g font-size="13" fill="#cfe5f1">
        <text x="253" y="60">SUPPRESSION FIRES</text>
        <text x="253" y="76" fill="#7fb6d6" font-size="11" letter-spacing="1">09:00 · automated review flag</text>

        <text x="620" y="60">MANUAL DETECTION</text>
        <text x="620" y="76" fill="#7fb6d6" font-size="11" letter-spacing="1">15:00 · dashboard drop noticed</text>
      </g>

      <g font-size="15" fill="#00B5E2">
        <text x="426" y="132" text-anchor="middle" font-weight="700">6-HOUR DETECTION GAP</text>
        <text x="426" y="152" text-anchor="middle" fill="#cfe5f1" font-size="12" opacity="0.85">unrecoverable revenue on a top-20 SKU</text>
      </g>

      <g fill="#7fb6d6" font-size="11" text-anchor="end">
        <text x="52" y="46">units</text>
        <text x="52" y="196">0</text>
      </g>

      <g transform="translate(0,258)" fill="#5e8aa6" font-size="12" letter-spacing="2">
        <text>DIRECTIONAL SHAPE · MID-MARKET DTC CATALOG</text>
      </g>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
