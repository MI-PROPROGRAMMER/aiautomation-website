<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Aged retainage bar chart on a mid-size general contractor's balance sheet, with the ninety-plus day bucket highlighted">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.25" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="barFocus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="barBase" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a3a66" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#5e8aa6" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500"/>
    <path d="M0 400 H1500"/>
    <path d="M0 580 H1500"/>
    <path d="M0 760 H1500"/>
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.9">THE JOURNAL</text>
    <text y="88" font-size="84" font-weight="700" fill="#ffffff">Retainage Aging</text>
    <text y="176" font-size="52" font-weight="400" fill="#cfe5f1" opacity="0.9">the slow-cash cycle on mid-size GCs</text>
  </g>

  <g transform="translate(180,540)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">AGED RETAINAGE RECEIVABLE  ·  ILLUSTRATIVE $50M GC</text>

    <g font-size="16" fill="#5e8aa6">
      <text x="0" y="60">0–30 DAYS</text>
      <text x="0" y="120">31–60 DAYS</text>
      <text x="0" y="180">61–90 DAYS</text>
      <text x="0" y="240">90+ DAYS</text>
    </g>

    <g>
      <rect x="200" y="42" width="380" height="26" rx="3" fill="url(#barBase)" opacity="0.9"/>
      <text x="600" y="62" font-size="18" fill="#cfe5f1">$1.9M</text>

      <rect x="200" y="102" width="520" height="26" rx="3" fill="url(#barBase)" opacity="0.95"/>
      <text x="740" y="122" font-size="18" fill="#cfe5f1">$2.6M</text>

      <rect x="200" y="162" width="440" height="26" rx="3" fill="url(#barBase)"/>
      <text x="660" y="182" font-size="18" fill="#cfe5f1">$2.2M</text>

      <rect x="200" y="222" width="560" height="30" rx="3" fill="url(#barFocus)"/>
      <text x="780" y="244" font-size="20" fill="#ffffff" font-weight="700">$2.8M</text>
      <circle cx="185" cy="237" r="7" fill="#00B5E2"/>
    </g>

    <line x1="200" y1="278" x2="900" y2="278" stroke="#0a3a66" stroke-width="1"/>
    <text x="200" y="308" font-size="14" letter-spacing="2" fill="#7fb6d6">TOTAL RECEIVABLE  $9.5M  ·  90+ DAY EXPOSURE  $2.8M</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
