<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Restock Alert Lag decay curve visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="decayFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 240 H1500"/><path d="M0 400 H1500"/><path d="M0 560 H1500"/>
    <path d="M0 720 H1500"/><path d="M0 880 H1500"/>
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="78" font-weight="700" fill="#ffffff">Restock Alert Lag</text>
    <text y="180" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">waitlist intent is a decaying asset</text>
  </g>

  <g transform="translate(180,540)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">WAITLIST CONVERSION VS TIME FROM RESTOCK</text>

    <g transform="translate(0,60)" stroke="#0a3a66" stroke-width="1">
      <line x1="120" y1="220" x2="1160" y2="220"/>
      <line x1="120" y1="40" x2="120" y2="220"/>
    </g>

    <g transform="translate(0,60)" font-size="12" fill="#5e8aa6" font-family="Georgia, serif">
      <text x="80" y="48" text-anchor="end">25%</text>
      <text x="80" y="108" text-anchor="end">15%</text>
      <text x="80" y="168" text-anchor="end">5%</text>
      <text x="80" y="224" text-anchor="end">0</text>
    </g>

    <g transform="translate(0,60)">
      <path d="M120 60 C 260 90, 380 150, 520 180 S 800 210, 1160 218 L 1160 220 L 120 220 Z" fill="url(#decayFill)"/>
      <path d="M120 60 C 260 90, 380 150, 520 180 S 800 210, 1160 218" fill="none" stroke="#00B5E2" stroke-width="3"/>

      <circle cx="120" cy="60" r="7" fill="#00B5E2"/>
      <circle cx="320" cy="118" r="6" fill="#00B5E2" opacity="0.9"/>
      <circle cx="560" cy="182" r="5" fill="#00B5E2" opacity="0.75"/>
      <circle cx="820" cy="208" r="5" fill="#00B5E2" opacity="0.55"/>
      <circle cx="1120" cy="218" r="4" fill="#00B5E2" opacity="0.4"/>
    </g>

    <g transform="translate(0,300)" font-size="12" fill="#9fc4dc" font-family="Georgia, serif">
      <text x="120" text-anchor="middle">&lt;1 hr</text>
      <text x="320" text-anchor="middle">6 hr</text>
      <text x="560" text-anchor="middle">24 hr</text>
      <text x="820" text-anchor="middle">72 hr</text>
      <text x="1120" text-anchor="middle">1 week</text>
    </g>

    <g transform="translate(0,340)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">HOURLY BATCH SENDS MISS THE FIRST 6 HOURS OF INTENT</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
