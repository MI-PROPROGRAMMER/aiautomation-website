<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Cold chain freight claim backlog visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.74" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="safeBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3a66" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0a3a66" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="excursionFlash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500"/><path d="M0 360 H1500"/><path d="M0 520 H1500"/>
    <path d="M0 680 H1500"/><path d="M0 840 H1500"/>
  </g>

  <g transform="translate(180,260)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Cold Chain Claims</text>
    <text y="170" font-size="40" font-weight="400" fill="#cfe5f1" opacity="0.9">the brokerage backlog that hides on the reefer download</text>
  </g>

  <g transform="translate(180,500)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">REEFER TRAILER · TEMPERATURE TRACE OVER TRANSIT</text>

    <g transform="translate(0,40)">
      <rect x="0" y="100" width="1140" height="70" fill="url(#safeBand)"/>
      <text x="-8" y="108" font-size="11" fill="#7fb6d6" text-anchor="end">SAFE</text>
      <text x="-8" y="172" font-size="11" fill="#7fb6d6" text-anchor="end">ZONE</text>

      <rect x="540" y="20" width="120" height="200" fill="url(#excursionFlash)"/>

      <line x1="0" y1="220" x2="1140" y2="220" stroke="#5e8aa6" stroke-width="1.5"/>
      <line x1="0" y1="220" x2="0" y2="20" stroke="#5e8aa6" stroke-width="1.5"/>

      <text x="-8" y="225" font-size="12" fill="#7fb6d6" text-anchor="end">20F</text>
      <text x="-8" y="170" font-size="12" fill="#7fb6d6" text-anchor="end">35F</text>
      <text x="-8" y="105" font-size="12" fill="#7fb6d6" text-anchor="end">45F</text>
      <text x="-8" y="40" font-size="12" fill="#7fb6d6" text-anchor="end">60F</text>

      <text x="80" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">PICKUP</text>
      <text x="380" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">HR 6</text>
      <text x="600" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">HR 14</text>
      <text x="820" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">HR 22</text>
      <text x="1060" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">DELIVERY</text>

      <path d="M0 140 L150 142 L300 138 L450 140 L520 138 L560 90 L600 45 L640 88 L700 132 L820 138 L960 140 L1140 138"
            stroke="#00B5E2" stroke-width="3" fill="none" opacity="0.95"/>

      <circle cx="600" cy="45" r="6" fill="#00B5E2"/>
      <text x="612" y="38" font-size="13" fill="#ffffff" font-weight="600">excursion · 58F</text>
      <line x1="600" y1="51" x2="600" y2="100" stroke="#00B5E2" stroke-width="1" opacity="0.6" stroke-dasharray="3 3"/>
    </g>

    <g transform="translate(0,330)">
      <text font-size="13" letter-spacing="2" fill="#7fb6d6">CLAIM FILE · DAYS FROM INCIDENT TO SETTLEMENT</text>

      <g transform="translate(0,20)">
        <rect x="0" y="0" width="180" height="36" fill="#0a3a66" stroke="#0a3a66"/>
        <text x="90" y="23" font-size="13" fill="#cfe5f1" text-anchor="middle">DISCOVERY</text>
        <text x="90" y="55" font-size="11" fill="#7fb6d6" text-anchor="middle">D 0 to 7</text>

        <rect x="190" y="0" width="380" height="36" fill="#0a3a66" stroke="#00B5E2" stroke-width="1.5"/>
        <text x="380" y="23" font-size="13" fill="#ffffff" text-anchor="middle">EVIDENCE ASSEMBLY</text>
        <text x="380" y="55" font-size="11" fill="#00B5E2" text-anchor="middle">D 7 to 45 · backlog lives here</text>

        <rect x="580" y="0" width="240" height="36" fill="#0a3a66" stroke="#0a3a66"/>
        <text x="700" y="23" font-size="13" fill="#cfe5f1" text-anchor="middle">CARRIER REVIEW</text>
        <text x="700" y="55" font-size="11" fill="#7fb6d6" text-anchor="middle">D 45 to 90</text>

        <rect x="830" y="0" width="200" height="36" fill="#0a3a66" stroke="#0a3a66"/>
        <text x="930" y="23" font-size="13" fill="#cfe5f1" text-anchor="middle">SETTLE</text>
        <text x="930" y="55" font-size="11" fill="#7fb6d6" text-anchor="middle">D 90 to 120</text>
      </g>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
