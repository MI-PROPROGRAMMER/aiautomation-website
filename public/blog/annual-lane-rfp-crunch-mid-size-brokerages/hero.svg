<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="The Annual Lane RFP Crunch on Mid-Size Brokerages">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 240 H1500"/>
    <path d="M0 420 H1500"/>
    <path d="M0 600 H1500"/>
    <path d="M0 780 H1500"/>
  </g>

  <g transform="translate(140,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.9">THE JOURNAL</text>
    <line x1="0" y1="22" x2="180" y2="22" stroke="#00B5E2" stroke-width="2" opacity="0.7"/>

    <text y="120" font-size="82" font-weight="700" fill="#ffffff">The Annual Lane RFP</text>
    <text y="210" font-size="82" font-weight="700" fill="#ffffff">Crunch on Mid-Size</text>
    <text y="300" font-size="82" font-weight="700" fill="#ffffff">Brokerages</text>

    <text y="370" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">Why response capacity caps contract wins.</text>
  </g>

  <g transform="translate(140,640)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="16" letter-spacing="4" fill="#7fb6d6">RFP LANE FUNNEL · MID-SIZE BROKERAGE</text>

    <g transform="translate(0,40)">
      <text x="0" y="-2" font-size="16" fill="#9fc4dc" letter-spacing="2">LANES IN PACKET</text>
      <rect x="320" y="-22" width="1040" height="28" fill="#0a3a66"/>
      <rect x="320" y="-22" width="1040" height="28" fill="#5e8aa6" opacity="0.85"/>
      <text x="1370" y="-2" font-size="16" fill="#cfe5f1">2,000</text>
    </g>

    <g transform="translate(0,90)">
      <text x="0" y="-2" font-size="16" fill="#9fc4dc" letter-spacing="2">PRICED IN WINDOW</text>
      <rect x="320" y="-22" width="1040" height="28" fill="#0a3a66"/>
      <rect x="320" y="-22" width="676" height="28" fill="#7fb6d6" opacity="0.95"/>
      <text x="1370" y="-2" font-size="16" fill="#cfe5f1">1,300</text>
    </g>

    <g transform="translate(0,140)">
      <text x="0" y="-2" font-size="16" fill="#9fc4dc" letter-spacing="2">SUBMITTED ON TIME</text>
      <rect x="320" y="-22" width="1040" height="28" fill="#0a3a66"/>
      <rect x="320" y="-22" width="468" height="28" fill="#00B5E2" opacity="0.9"/>
      <text x="1370" y="-2" font-size="16" fill="#cfe5f1">900</text>
    </g>

    <g transform="translate(0,190)">
      <text x="0" y="-2" font-size="16" fill="#9fc4dc" letter-spacing="2">AWARDED</text>
      <rect x="320" y="-22" width="1040" height="28" fill="#0a3a66"/>
      <rect x="320" y="-22" width="94" height="28" fill="#00B5E2"/>
      <text x="1370" y="-2" font-size="16" fill="#cfe5f1">90</text>
    </g>

    <text x="0" y="225" font-size="13" letter-spacing="2" fill="#5e8aa6">ILLUSTRATIVE · ONE 2,000-LANE RFP PACKET ON A TWO-WEEK CLOCK</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
