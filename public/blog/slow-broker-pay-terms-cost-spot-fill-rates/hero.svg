<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Broker payment terms vs first-call carrier fill rate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.24" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500" /><path d="M0 380 H1500" /><path d="M0 540 H1500" />
    <path d="M0 700 H1500" /><path d="M0 860 H1500" />
  </g>

  <g transform="translate(140,240)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="76" font-weight="700" fill="#ffffff">Payment Speed Buys</text>
    <text y="180" font-size="76" font-weight="700" fill="#ffffff">Carrier Loyalty</text>
    <text y="248" font-size="34" font-weight="400" fill="#cfe5f1" opacity="0.9">how broker AP terms reshape spot fill rate</text>
  </g>

  <g transform="translate(140,570)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">FIRST-CALL FILL RATE BY BROKER PAYMENT TERM</text>

    <g transform="translate(0,44)">
      <text font-size="16" fill="#9fc4dc">NET 3</text>
      <rect x="180" y="-16" width="900" height="18" fill="#0a3a66"/>
      <rect x="180" y="-16" width="702" height="18" fill="url(#barFill)"/>
      <text x="1100" y="-2" font-size="16" fill="#cfe5f1">78%</text>
    </g>

    <g transform="translate(0,84)">
      <text font-size="16" fill="#9fc4dc">NET 7</text>
      <rect x="180" y="-16" width="900" height="18" fill="#0a3a66"/>
      <rect x="180" y="-16" width="612" height="18" fill="url(#barFill)" opacity="0.9"/>
      <text x="1100" y="-2" font-size="16" fill="#cfe5f1">68%</text>
    </g>

    <g transform="translate(0,124)">
      <text font-size="16" fill="#9fc4dc">NET 15</text>
      <rect x="180" y="-16" width="900" height="18" fill="#0a3a66"/>
      <rect x="180" y="-16" width="495" height="18" fill="url(#barFill)" opacity="0.78"/>
      <text x="1100" y="-2" font-size="16" fill="#cfe5f1">55%</text>
    </g>

    <g transform="translate(0,164)">
      <text font-size="16" fill="#9fc4dc">NET 30</text>
      <rect x="180" y="-16" width="900" height="18" fill="#0a3a66"/>
      <rect x="180" y="-16" width="423" height="18" fill="url(#barFill)" opacity="0.62"/>
      <text x="1100" y="-2" font-size="16" fill="#cfe5f1">47%</text>
    </g>

    <g transform="translate(0,204)">
      <text font-size="16" fill="#9fc4dc">NET 45</text>
      <rect x="180" y="-16" width="900" height="18" fill="#0a3a66"/>
      <rect x="180" y="-16" width="378" height="18" fill="url(#barFill)" opacity="0.5"/>
      <text x="1100" y="-2" font-size="16" fill="#cfe5f1">42%</text>
    </g>

    <g transform="translate(0,258)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">FASTER CARRIER PAY · HIGHER FIRST-CALL COVERAGE · TIGHTER SPOT MARGIN</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
