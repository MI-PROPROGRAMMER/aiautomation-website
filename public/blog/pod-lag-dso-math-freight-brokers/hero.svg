<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="POD lag and the DSO math for freight brokers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="lagFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.4">
    <path d="M0 220 H1500"/>
    <path d="M0 380 H1500"/>
    <path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/>
    <path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,250)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="90" font-size="84" font-weight="700" fill="#ffffff">POD Lag &amp; the DSO Math</text>
    <text y="160" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">what slow PODs cost a freight brokerage in cash</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">CASH CONVERSION CYCLE  ·  DELIVERY TO PAID</text>

    <g transform="translate(0,40)">
      <text font-size="16" fill="#9fc4dc">MANUAL POD CAPTURE</text>
      <text x="1150" y="0" font-size="14" fill="#cfe5f1" letter-spacing="2">35 DAYS</text>
      <g transform="translate(0,22)">
        <rect x="0" y="0" width="1140" height="30" fill="#0a3a66"/>
        <rect x="0" y="0" width="143" height="30" fill="url(#lagFade)"/>
        <rect x="143" y="0" width="857" height="30" fill="#7fb6d6" opacity="0.55"/>
        <rect x="1000" y="0" width="140" height="30" fill="#5e8aa6" opacity="0.7"/>
        <text x="6" y="50" font-size="12" fill="#cfe5f1">POD LAG  5d</text>
        <text x="450" y="50" font-size="12" fill="#cfe5f1">NET 30  invoice aging</text>
        <text x="1006" y="50" font-size="12" fill="#cfe5f1">PAID</text>
      </g>
    </g>

    <g transform="translate(0,160)">
      <text font-size="16" fill="#9fc4dc">AI-ASSISTED POD CAPTURE</text>
      <text x="1150" y="0" font-size="14" fill="#cfe5f1" letter-spacing="2">31 DAYS</text>
      <g transform="translate(0,22)">
        <rect x="0" y="0" width="1140" height="30" fill="#0a3a66"/>
        <rect x="0" y="0" width="29" height="30" fill="url(#lagFade)"/>
        <rect x="29" y="0" width="857" height="30" fill="#7fb6d6" opacity="0.55"/>
        <rect x="886" y="0" width="140" height="30" fill="#5e8aa6" opacity="0.7"/>
        <text x="6" y="50" font-size="12" fill="#cfe5f1">POD LAG  &lt;1d</text>
        <text x="340" y="50" font-size="12" fill="#cfe5f1">NET 30  invoice aging</text>
        <text x="892" y="50" font-size="12" fill="#cfe5f1">PAID</text>
      </g>
    </g>

    <g transform="translate(0,275)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">5 DAYS OF POD LAG  ≈  $275K OF WORKING CAPITAL ON A $20M BROKERAGE</text>
    </g>
