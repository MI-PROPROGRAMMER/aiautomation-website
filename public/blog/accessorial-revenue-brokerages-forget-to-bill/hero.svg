<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Accessorial revenue recovery visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="absorbed" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#0a3a66"/>
      <path d="M-2,2 l4,-4 M0,10 l10,-10 M8,12 l4,-4" stroke="#5e8aa6" stroke-width="1" stroke-opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g transform="translate(180,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="92" font-size="72" font-weight="700" fill="#ffffff">The Accessorial Revenue</text>
    <text y="172" font-size="72" font-weight="700" fill="#ffffff">Most Brokerages Forget to Bill</text>
    <text y="232" font-size="32" font-weight="400" fill="#cfe5f1" opacity="0.9">Where the recoverable pool actually sits</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">ACCESSORIAL POOL · RECOVERED vs ABSORBED · ILLUSTRATIVE MID-SIZE BROKERAGE</text>

    <g transform="translate(0,30)" font-size="14" fill="#cfe5f1">
      <g transform="translate(0,0)">
        <text x="0" y="14">DETENTION</text>
        <rect x="200" y="0" width="450" height="22" rx="2" fill="#00B5E2" opacity="0.92"/>
        <rect x="650" y="0" width="450" height="22" rx="2" fill="url(#absorbed)"/>
        <text x="1120" y="14" font-size="13" fill="#7fb6d6">50% billed</text>
      </g>

      <g transform="translate(0,42)">
        <text x="0" y="14">LUMPER</text>
        <rect x="200" y="0" width="585" height="22" rx="2" fill="#00B5E2" opacity="0.92"/>
        <rect x="785" y="0" width="315" height="22" rx="2" fill="url(#absorbed)"/>
        <text x="1120" y="14" font-size="13" fill="#7fb6d6">65% billed</text>
      </g>

      <g transform="translate(0,84)">
        <text x="0" y="14">LAYOVER / TONU</text>
        <rect x="200" y="0" width="360" height="22" rx="2" fill="#00B5E2" opacity="0.92"/>
        <rect x="560" y="0" width="540" height="22" rx="2" fill="url(#absorbed)"/>
        <text x="1120" y="14" font-size="13" fill="#7fb6d6">40% billed</text>
      </g>

      <g transform="translate(0,126)">
        <text x="0" y="14">TARP / OPEN DECK</text>
        <rect x="200" y="0" width="495" height="22" rx="2" fill="#00B5E2" opacity="0.92"/>
        <rect x="695" y="0" width="405" height="22" rx="2" fill="url(#absorbed)"/>
        <text x="1120" y="14" font-size="13" fill="#7fb6d6">55% billed</text>
      </g>

      <g transform="translate(0,168)">
        <text x="0" y="14">RECLASS / REWEIGH</text>
        <rect x="200" y="0" width="270" height="22" rx="2" fill="#00B5E2" opacity="0.92"/>
        <rect x="470" y="0" width="630" height="22" rx="2" fill="url(#absorbed)"/>
        <text x="1120" y="14" font-size="13" fill="#7fb6d6">30% billed</text>
      </g>
    </g>

    <g transform="translate(0,250)">
      <rect x="0" y="0" width="18" height="14" rx="2" fill="#00B5E2" opacity="0.92"/>
      <text x="28" y="12" font-size="13" fill="#cfe5f1">BILLED TO SHIPPER</text>

      <rect x="220" y="0" width="18" height="14" rx="2" fill="url(#absorbed)"/>
      <text x="248" y="12" font-size="13" fill="#cfe5f1">ABSORBED BY BROKERAGE</text>

      <text x="540" y="12" font-size="13" letter-spacing="2" fill="#5e8aa6">UNBILLED POOL ≈ 3–8% OF GROSS REVENUE · TIA / FREIGHTWAVES SURVEYS</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
