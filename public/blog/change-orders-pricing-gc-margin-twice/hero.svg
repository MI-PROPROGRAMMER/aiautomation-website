<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Change orders pricing GC margin twice: compression visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pricedBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#5e8aa6"/>
    </linearGradient>
    <linearGradient id="realizedBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#7fb6d6"/>
    </linearGradient>
    <linearGradient id="lossZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.25">
    <path d="M0 240 H1500"/>
    <path d="M0 440 H1500"/>
    <path d="M0 640 H1500"/>
    <path d="M0 820 H1500"/>
  </g>

  <g transform="translate(180,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Priced Twice</text>
    <text y="170" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">the 7-to-21-day change-order window on a mid-size GC</text>
  </g>

  <g font-family="Georgia, serif">
    <text x="180" y="490" font-size="14" letter-spacing="3" fill="#7fb6d6">MARGIN COMPRESSION ACROSS THE PRICING WINDOW</text>

    <g stroke="#5e8aa6" stroke-width="1" opacity="0.45">
      <path d="M260 760 H1320"/>
    </g>

    <g>
      <rect x="320" y="540" width="160" height="220" fill="url(#pricedBar)" rx="4"/>
      <text x="400" y="790" font-size="16" fill="#cfe5f1" text-anchor="middle">Day 0</text>
      <text x="400" y="812" font-size="13" fill="#7fb6d6" text-anchor="middle">PCO drafted</text>
      <text x="400" y="525" font-size="14" fill="#cfe5f1" text-anchor="middle" opacity="0.85">priced margin</text>
    </g>

    <g>
      <rect x="640" y="600" width="160" height="160" fill="url(#realizedBar)" rx="4"/>
      <rect x="640" y="540" width="160" height="60" fill="url(#lossZone)" rx="4"/>
      <text x="720" y="790" font-size="16" fill="#cfe5f1" text-anchor="middle">Day 7</text>
      <text x="720" y="812" font-size="13" fill="#7fb6d6" text-anchor="middle">sub pricing returned</text>
      <text x="720" y="575" font-size="13" fill="#00B5E2" text-anchor="middle" opacity="0.85">cost variance</text>
    </g>

    <g>
      <rect x="960" y="660" width="160" height="100" fill="url(#realizedBar)" rx="4"/>
      <rect x="960" y="540" width="160" height="120" fill="url(#lossZone)" rx="4"/>
      <text x="1040" y="790" font-size="16" fill="#cfe5f1" text-anchor="middle">Day 14</text>
      <text x="1040" y="812" font-size="13" fill="#7fb6d6" text-anchor="middle">PCO approved</text>
      <text x="1040" y="610" font-size="13" fill="#00B5E2" text-anchor="middle" opacity="0.9">+ cash float</text>
    </g>

    <g>
      <rect x="1180" y="730" width="120" height="30" fill="url(#realizedBar)" rx="4"/>
      <rect x="1180" y="540" width="120" height="190" fill="url(#lossZone)" rx="4"/>
      <text x="1240" y="790" font-size="16" fill="#cfe5f1" text-anchor="middle">Day 21</text>
      <text x="1240" y="812" font-size="13" fill="#7fb6d6" text-anchor="middle">billed on pay app</text>
    </g>

    <g>
      <path d="M495 545 Q570 510 625 540" stroke="#00B5E2" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="3 4"/>
      <path d="M810 545 Q890 510 950 540" stroke="#00B5E2" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="3 4"/>
      <path d="M1130 545 Q1160 515 1175 540" stroke="#00B5E2" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="3 4"/>
    </g>

    <text x="750" y="870" font-size="13" letter-spacing="3" fill="#5e8aa6" text-anchor="middle">EACH OPEN DAY COMPOUNDS THE EROSION</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
