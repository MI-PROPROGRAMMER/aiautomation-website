<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Long-Lead Procurement Slippage visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500" /><path d="M0 380 H1500" /><path d="M0 540 H1500" />
    <path d="M0 700 H1500" /><path d="M0 860 H1500" />
  </g>

  <g transform="translate(150,240)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Long-Lead Procurement</text>
    <text y="180" font-size="84" font-weight="700" fill="#ffffff">Slippage</text>
    <text y="240" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">where the cost of the slip lands on the GC</text>
  </g>

  <g transform="translate(150,640)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">SWITCHGEAR DELIVERY · MID-SIZE GC JOB</text>

    <g transform="translate(0,40)" font-size="12" fill="#5e8aa6" letter-spacing="2">
      <text x="220" y="0">WK 20</text>
      <text x="430" y="0">WK 26</text>
      <text x="640" y="0">WK 30</text>
      <text x="850" y="0">WK 34</text>
      <text x="1060" y="0">WK 38</text>
    </g>

    <g transform="translate(0,80)">
      <text font-size="14" fill="#9fc4dc">SCHEDULED</text>
      <rect x="220" y="-14" width="900" height="16" fill="#0a3a66"/>
      <rect x="220" y="-14" width="450" height="16" fill="#00B5E2" opacity="0.9"/>
      <circle cx="670" cy="-6" r="9" fill="#00B5E2"/>
      <text x="690" y="-2" font-size="14" fill="#cfe5f1">WK 30 SHIP</text>
    </g>

    <g transform="translate(0,135)">
      <text font-size="14" fill="#9fc4dc">REVISED</text>
      <rect x="220" y="-14" width="900" height="16" fill="#0a3a66"/>
      <rect x="220" y="-14" width="850" height="16" fill="#00B5E2" opacity="0.55"/>
      <circle cx="1070" cy="-6" r="9" fill="#7fb6d6"/>
      <text x="1090" y="-2" font-size="14" fill="#cfe5f1">WK 38</text>
    </g>

    <g transform="translate(670,170)">
      <path d="M0 0 H400" stroke="#00B5E2" stroke-width="2" opacity="0.7"/>
      <path d="M0 -6 V6" stroke="#00B5E2" stroke-width="2" opacity="0.7"/>
      <path d="M400 -6 V6" stroke="#00B5E2" stroke-width="2" opacity="0.7"/>
      <text x="200" y="-12" font-size="16" fill="#cfe5f1" text-anchor="middle">8-WEEK SLIP</text>
    </g>

    <g transform="translate(0,215)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">EVERY SLIP NARROWS THE RECOVERY WINDOW · LATE DETECTION COSTS THE MOST</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
