<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Why DTC false declines cost more than the fraud they stop: proportional comparison of fraud caught versus legitimate orders rejected">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="fraudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fb6d6"/>
      <stop offset="1" stop-color="#5e8aa6"/>
    </linearGradient>
    <linearGradient id="falseFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#0a3a66"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.32">
    <path d="M0 220 H1500"/>
    <path d="M0 400 H1500"/>
    <path d="M0 580 H1500"/>
    <path d="M0 760 H1500"/>
  </g>

  <g transform="translate(150,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="78" font-weight="700" fill="#ffffff">Why DTC False Declines</text>
    <text y="186" font-size="78" font-weight="700" fill="#ffffff">Cost More Than the Fraud</text>
    <text y="252" font-size="34" font-weight="400" fill="#cfe5f1" opacity="0.9">the unseen tax on conversion at every CNP brand</text>
  </g>

  <g transform="translate(220,520)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">RELATIVE VOLUME PER 100 FLAGGED ORDERS, INDUSTRY MEDIAN</text>

    <g transform="translate(0,30)">
      <line x1="0" y1="280" x2="1060" y2="280" stroke="#5e8aa6" stroke-width="1" opacity="0.6"/>
      <text x="-12" y="40" font-size="11" fill="#5e8aa6" text-anchor="end" letter-spacing="2">HIGH</text>
      <text x="-12" y="280" font-size="11" fill="#5e8aa6" text-anchor="end" letter-spacing="2">LOW</text>

      <g transform="translate(120,0)">
        <rect x="0" y="220" width="180" height="60" fill="url(#fraudFill)" opacity="0.95"/>
        <rect x="0" y="210" width="180" height="10" fill="#cfe5f1" opacity="0.85"/>
        <text x="90" y="316" font-size="16" letter-spacing="3" fill="#cfe5f1" text-anchor="middle">REAL FRAUD CAUGHT</text>
        <text x="90" y="346" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">~10</text>
        <text x="90" y="372" font-size="12" letter-spacing="2" fill="#7fb6d6" text-anchor="middle">CONFIRMED CASES</text>
      </g>

      <g transform="translate(560,0)">
        <rect x="0" y="40" width="180" height="240" fill="url(#falseFill)" opacity="0.95"/>
        <rect x="0" y="30" width="180" height="10" fill="#00B5E2" opacity="0.9"/>
        <text x="90" y="316" font-size="16" letter-spacing="3" fill="#00B5E2" text-anchor="middle">FALSE DECLINES</text>
        <text x="90" y="346" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">~65</text>
        <text x="90" y="372" font-size="12" letter-spacing="2" fill="#7fb6d6" text-anchor="middle">LEGIT ORDERS LOST</text>
      </g>

      <g transform="translate(330,140)">
        <path d="M0 0 L220 0" stroke="#00B5E2" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.7"/>
        <polygon points="218,-5 230,0 218,5" fill="#00B5E2" opacity="0.85"/>
        <text x="115" y="-12" font-size="13" letter-spacing="3" fill="#00B5E2" text-anchor="middle" opacity="0.9">6x TO 10x WIDER</text>
      </g>

      <g transform="translate(820,40)" font-family="Georgia, 'Times New Roman', serif">
        <text font-size="13" letter-spacing="2" fill="#7fb6d6">SOURCES</text>
        <text y="24" font-size="13" fill="#cfe5f1" opacity="0.85">Datos Insights</text>
        <text y="46" font-size="13" fill="#cfe5f1" opacity="0.85">Stripe Fraud Insights</text>
        <text y="68" font-size="13" fill="#cfe5f1" opacity="0.85">Visa &amp; Mastercard</text>
        <text y="90" font-size="13" fill="#cfe5f1" opacity="0.85">Signifyd merchant data</text>
      </g>
    </g>
  </g>

  <g transform="translate(150,860)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="12" letter-spacing="2" fill="#5e8aa6">EVERY FRAUD SCREEN BLOCKS MORE LEGITIMATE ORDERS THAN FRAUDULENT ONES. THE GAP IS THE STORY.</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
