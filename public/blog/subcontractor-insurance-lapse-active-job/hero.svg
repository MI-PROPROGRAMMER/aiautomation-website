<svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#00B5E2"/>
      <stop offset="0.75" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#00B5E2"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bgGrad)"/>

  <text x="750" y="190" text-anchor="middle" fill="#00B5E2" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="6" font-weight="500">THE JOURNAL</text>

  <text x="750" y="322" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700">Coverage Lapse</text>

  <text x="750" y="392" text-anchor="middle" fill="#cfe5f1" fill-opacity="0.9" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-style="italic">When a subcontractor's insurance runs out mid-job</text>

  <text x="320" y="512" fill="#7fb6d6" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="3">PROJECT DURATION</text>
  <rect x="320" y="528" width="860" height="26" rx="13" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1.5"/>
  <circle cx="320" cy="541" r="9" fill="#5e8aa6"/>
  <circle cx="1180" cy="541" r="9" fill="#5e8aa6"/>

  <text x="320" y="624" fill="#7fb6d6" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="3">INSURANCE COVERAGE</text>
  <rect x="320" y="640" width="540" height="26" rx="13" fill="url(#coverGrad)"/>
  <rect x="864" y="640" width="316" height="26" rx="13" fill="none" stroke="#00B5E2" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="3 9"/>

  <line x1="860" y1="498" x2="860" y2="712" stroke="#00B5E2" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="6 8"/>
  <circle cx="860" cy="653" r="13" fill="#001a36" stroke="#00B5E2" stroke-width="3"/>
  <text x="860" y="486" text-anchor="middle" fill="#00B5E2" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="4">COI EXPIRES</text>

  <text x="590" y="742" text-anchor="middle" fill="#7fb6d6" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic">verified at award</text>
  <text x="1022" y="742" text-anchor="middle" fill="#cfe5f1" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic">work continues, coverage does not</text>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentBar)"/>
</svg>
