<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="The Hidden Cost of a Manual Freight Sales Desk">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="wastedBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#0a3a66" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.4">
    <path d="M0 200 H1500" /><path d="M0 360 H1500" /><path d="M0 520 H1500" />
    <path d="M0 680 H1500" /><path d="M0 840 H1500" />
  </g>

  <g transform="translate(180,260)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">The Hidden Cost</text>
    <text y="170" font-size="40" font-weight="400" fill="#cfe5f1" opacity="0.9">of a manual freight sales desk</text>
  </g>

  <g transform="translate(180,560)">
    <text font-family="Georgia, serif" font-size="14" letter-spacing="3" fill="#7fb6d6">A REP'S DAY · ADMIN VS. SELLING</text>

    <g transform="translate(0,40)">
      <rect x="0" y="0" width="1140" height="22" fill="url(#wastedBar)"/>
      <rect x="0" y="0" width="912" height="22" fill="#0a3a66"/>
      <rect x="912" y="0" width="228" height="22" fill="#00B5E2"/>
      <text x="0" y="-12" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#7fb6d6">TODAY</text>
      <text x="780" y="60" font-family="Georgia, serif" font-size="14" fill="#5e8aa6">~ 80% on copy-paste, follow-ups, CRM updates</text>
    </g>

    <g transform="translate(0,140)">
      <rect x="0" y="0" width="1140" height="22" fill="#0a3a66" opacity="0.5"/>
      <rect x="0" y="0" width="228" height="22" fill="#0a3a66"/>
      <rect x="228" y="0" width="912" height="22" fill="#00B5E2"/>
      <text x="0" y="-12" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#7fb6d6">AFTER AI HANDLES THE 80%</text>
      <text x="240" y="60" font-family="Georgia, serif" font-size="14" fill="#cfe5f1">Reps spend the day talking to shippers and carriers</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
