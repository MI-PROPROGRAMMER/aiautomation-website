<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Freight sales desk visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.45">
    <path d="M0 80 H1200" /><path d="M0 160 H1200" /><path d="M0 240 H1200" />
    <path d="M0 320 H1200" /><path d="M0 400 H1200" /><path d="M0 480 H1200" />
    <path d="M0 560 H1200" />
  </g>

  <g transform="translate(120,150)" font-family="Georgia, 'Times New Roman', serif" fill="#ffffff">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="80" font-size="64" font-weight="700">The Hidden Cost</text>
    <text y="150" font-size="64" font-weight="700">of a Manual Freight</text>
    <text y="220" font-size="64" font-weight="700">Sales Desk</text>
  </g>

  <g transform="translate(720,420)" opacity="0.85">
    <rect x="0" y="0" width="360" height="6" fill="#0a3a66"/>
    <rect x="0" y="0" width="220" height="6" fill="#00B5E2"/>
    <text x="0" y="32" font-family="Georgia, serif" font-size="14" letter-spacing="3" fill="#7fb6d6">RFQ → QUOTE → FOLLOW-UP → CLOSE</text>

    <rect x="0" y="60" width="360" height="6" fill="#0a3a66"/>
    <rect x="0" y="60" width="120" height="6" fill="#00B5E2"/>
    <text x="0" y="92" font-family="Georgia, serif" font-size="14" letter-spacing="3" fill="#7fb6d6">REVENUE TIME LOST TO ADMIN</text>
  </g>

  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
