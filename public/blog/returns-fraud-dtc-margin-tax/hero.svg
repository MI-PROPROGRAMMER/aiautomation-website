<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Returns Fraud at DTC Brands visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.78" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 240 H1500" /><path d="M0 400 H1500" /><path d="M0 560 H1500" />
    <path d="M0 720 H1500" />
  </g>

  <g transform="translate(180,250)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Returns Fraud</text>
    <text y="170" font-size="40" font-weight="400" fill="#cfe5f1" opacity="0.9">the margin tax few DTC brands track</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">EVERY $100 IN RETURN VALUE</text>

    <g transform="translate(0,40)">
      <rect x="0" y="0" width="1140" height="56" fill="#0a3a66"/>
      <rect x="0" y="0" width="992" height="56" fill="#5e8aa6" opacity="0.85"/>
      <rect x="992" y="0" width="148" height="56" fill="#00B5E2"/>
      <text x="20" y="34" font-size="20" fill="#ffffff" opacity="0.95">$87 good-faith returns</text>
      <text x="1010" y="34" font-size="20" font-weight="700" fill="#001a36">$13</text>
      <text x="1010" y="80" font-size="14" fill="#cfe5f1" opacity="0.9">fraud + abuse</text>
    </g>

    <g transform="translate(0,170)">
      <text font-size="13" letter-spacing="2" fill="#5e8aa6">SOURCE: NRF + APPRISS RETAIL CONSUMER RETURNS SURVEYS</text>
    </g>

    <g transform="translate(0,210)" font-family="Georgia, serif">
      <text font-size="16" fill="#cfe5f1" opacity="0.85">Wardrobing  ·  Empty-box claims  ·  Serial returners  ·  Bracketing  ·  Reseller abuse</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
