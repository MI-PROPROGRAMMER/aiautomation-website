<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Construction daily reports from forms to AI-assisted summaries">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.7">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="manualBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5e8aa6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5e8aa6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="aiBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.32">
    <path d="M0 220 H1500"/>
    <path d="M0 380 H1500"/>
    <path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/>
    <path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,230)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="90" font-size="80" font-weight="700" fill="#ffffff">Daily Reports on GC Jobs</text>
    <text y="158" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">from forms to AI-assisted summaries</text>
  </g>

  <g transform="translate(180,520)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">END-OF-DAY DOCUMENTATION TAX  ·  ONE SUPERINTENDENT, ONE JOB</text>

    <g transform="translate(0,46)">
      <text x="0" y="22" font-size="18" letter-spacing="2" fill="#9fc4dc">MANUAL WORKFLOW</text>
      <text x="0" y="50" font-size="14" fill="#7fb6d6">photos · voice memos · manpower · weather · deliveries · safety · write-up</text>

      <g transform="translate(0,70)">
        <rect x="0" y="0" width="1140" height="36" fill="#0a3a66" opacity="0.55" rx="4"/>
        <rect x="0" y="0" width="1140" height="36" fill="url(#manualBar)" rx="4"/>
        <text x="1100" y="60" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">60 min</text>
      </g>

      <g transform="translate(0,38)" font-family="Georgia, serif">
        <text x="0" y="80" font-size="11" letter-spacing="2" fill="#5e8aa6">5pm</text>
        <text x="285" y="80" font-size="11" letter-spacing="2" fill="#5e8aa6">5:15</text>
        <text x="570" y="80" font-size="11" letter-spacing="2" fill="#5e8aa6">5:30</text>
        <text x="855" y="80" font-size="11" letter-spacing="2" fill="#5e8aa6">5:45</text>
        <text x="1140" y="80" font-size="11" letter-spacing="2" fill="#5e8aa6" text-anchor="end">6pm</text>
      </g>
    </g>

    <g transform="translate(0,210)">
      <text x="0" y="22" font-size="18" letter-spacing="2" fill="#9fc4dc">AI-ASSISTED REVIEW</text>
      <text x="0" y="50" font-size="14" fill="#7fb6d6">draft compiled from same inputs · super edits the narrative</text>

      <g transform="translate(0,70)">
        <rect x="0" y="0" width="1140" height="36" fill="#0a3a66" opacity="0.55" rx="4"/>
        <rect x="0" y="0" width="152" height="36" fill="url(#aiBar)" rx="4"/>
        <text x="170" y="26" font-size="22" font-weight="700" fill="#ffffff">8 min</text>
      </g>
    </g>

    <g transform="translate(0,360)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">SAME SUPER  ·  SAME INPUTS  ·  THE COMPILATION LAYER MOVES, THE JUDGMENT STAYS</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
