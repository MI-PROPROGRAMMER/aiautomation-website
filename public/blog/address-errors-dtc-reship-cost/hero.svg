<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Address errors and the DTC reship cost stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#00B5E2"/>
      <stop offset="0.75" stop-color="#00B5E2"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="1000" fill="url(#bg)"/>

  <text x="150" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#00B5E2" letter-spacing="6" font-weight="600">THE JOURNAL</text>

  <text x="150" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="80" fill="#ffffff" font-weight="700">Address Errors</text>
  <text x="150" y="412" font-family="Georgia, 'Times New Roman', serif" font-size="80" fill="#ffffff" font-weight="700">and the DTC</text>
  <text x="150" y="504" font-family="Georgia, 'Times New Roman', serif" font-size="80" fill="#ffffff" font-weight="700">Reship Cost Stack</text>

  <text x="150" y="580" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#cfe5f1" opacity="0.9" font-style="italic">What one undeliverable order really costs.</text>

  <text x="150" y="700" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#7fb6d6" letter-spacing="4">E-COMMERCE OPS &#183; APEXIFYLABS</text>

  <g transform="translate(870, 230)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#7fb6d6" letter-spacing="3">COST OF ONE UNDELIVERABLE</text>

    <rect x="0" y="40" width="500" height="70" fill="#0a3a66" stroke="#00B5E2" stroke-width="1"/>
    <text x="20" y="84" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1">Outbound shipping</text>
    <text x="480" y="84" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#ffffff" text-anchor="end" font-weight="600">$9</text>

    <rect x="0" y="125" width="500" height="70" fill="#0a3a66" stroke="#00B5E2" stroke-width="1"/>
    <text x="20" y="169" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1">RTS / address fee</text>
    <text x="480" y="169" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#ffffff" text-anchor="end" font-weight="600">$20</text>

    <rect x="0" y="210" width="500" height="70" fill="#0a3a66" stroke="#00B5E2" stroke-width="1"/>
    <text x="20" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1">Reship outbound</text>
    <text x="480" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#ffffff" text-anchor="end" font-weight="600">$9</text>

    <rect x="0" y="295" width="500" height="70" fill="#0a3a66" stroke="#00B5E2" stroke-width="1"/>
    <text x="20" y="339" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1">CX agent time</text>
    <text x="480" y="339" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#ffffff" text-anchor="end" font-weight="600">$7</text>

    <rect x="0" y="380" width="500" height="70" fill="#00B5E2" opacity="0.85"/>
    <text x="20" y="424" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#001a36" font-weight="600">Lost product risk</text>
    <text x="480" y="424" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#001a36" text-anchor="end" font-weight="700">$10</text>

    <line x1="0" y1="475" x2="500" y2="475" stroke="#00B5E2" stroke-width="2"/>
    <text x="20" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#ffffff" font-weight="700">Total per failure</text>
    <text x="480" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#00B5E2" text-anchor="end" font-weight="700">~$55</text>

    <text x="0" y="575" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#5e8aa6" font-style="italic">Illustrative; ranges vary by AOV and carrier.</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accent)"/>
</svg>
