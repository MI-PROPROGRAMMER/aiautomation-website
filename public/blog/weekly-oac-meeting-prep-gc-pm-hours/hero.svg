<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2"/>
      <stop offset="0.5" stop-color="#7fb6d6"/>
      <stop offset="1" stop-color="#00B5E2"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>

  <text x="750" y="205" fill="#00B5E2" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="6" text-anchor="middle" font-weight="500">THE JOURNAL</text>

  <text x="750" y="315" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="700" text-anchor="middle">Weekly OAC Meeting Prep</text>
  <text x="750" y="395" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="700" text-anchor="middle">at Mid-Size GCs</text>

  <text x="750" y="460" fill="#cfe5f1" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" text-anchor="middle" opacity="0.9">Where the project manager hours actually go</text>

  <text x="200" y="580" fill="#cfe5f1" font-family="Georgia, 'Times New Roman', serif" font-size="22" opacity="0.85">Hours per job, per week</text>
  <text x="1300" y="580" fill="#cfe5f1" font-family="Georgia, 'Times New Roman', serif" font-size="22" opacity="0.85" text-anchor="end">6 hours (typical)</text>

  <g>
    <rect x="200" y="605" width="183" height="70" fill="#00B5E2"/>
    <rect x="383" y="605" width="275" height="70" fill="#7fb6d6"/>
    <rect x="658" y="605" width="138" height="70" fill="#5e8aa6"/>
    <rect x="796" y="605" width="92" height="70" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1.5"/>
    <rect x="888" y="605" width="137" height="70" fill="#7fb6d6" opacity="0.75"/>
    <rect x="1025" y="605" width="275" height="70" fill="#00B5E2" opacity="0.7"/>
  </g>

  <g stroke="#cfe5f1" stroke-width="1" opacity="0.4">
    <line x1="200" y1="690" x2="200" y2="700"/>
    <line x1="383" y1="690" x2="383" y2="700"/>
    <line x1="750" y1="690" x2="750" y2="700"/>
    <line x1="1117" y1="690" x2="1117" y2="700"/>
    <line x1="1300" y1="690" x2="1300" y2="700"/>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#7fb6d6" text-anchor="middle" opacity="0.9">
    <text x="200" y="720">0h</text>
    <text x="383" y="720">1h</text>
    <text x="750" y="720">3h</text>
    <text x="1117" y="720">5h</text>
    <text x="1300" y="720">6h</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#cfe5f1">
    <g>
      <rect x="200" y="770" width="16" height="16" fill="#00B5E2"/>
      <text x="226" y="784">Schedule pull</text>
    </g>
    <g>
      <rect x="420" y="770" width="16" height="16" fill="#7fb6d6"/>
      <text x="446" y="784">Cost and CORs</text>
    </g>
    <g>
      <rect x="670" y="770" width="16" height="16" fill="#5e8aa6"/>
      <text x="696" y="784">RFI and submittals</text>
    </g>
    <g>
      <rect x="960" y="770" width="16" height="16" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1.5"/>
      <text x="986" y="784">Safety summary</text>
    </g>

    <g>
      <rect x="200" y="810" width="16" height="16" fill="#7fb6d6" opacity="0.75"/>
      <text x="226" y="824">Photos and daily-report highlights</text>
    </g>
    <g>
      <rect x="720" y="810" width="16" height="16" fill="#00B5E2" opacity="0.7"/>
      <text x="746" y="824">Narrative and owner-template assembly</text>
    </g>
  </g>

  <text x="750" y="870" fill="#7fb6d6" font-family="Georgia, 'Times New Roman', serif" font-size="20" text-anchor="middle" opacity="0.65">ApexifyLabs, The Journal</text>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accent)"/>
</svg>
