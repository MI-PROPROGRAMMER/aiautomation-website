<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a36"/>
      <stop offset="100%" stop-color="#002347"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00B5E2" stop-opacity="1"/>
      <stop offset="75%" stop-color="#00B5E2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aiBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sampledBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5e8aa6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5e8aa6" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>

  <!-- Decorative invoice grid (subtle, top right) -->
  <g opacity="0.08" stroke="#7fb6d6" stroke-width="1" fill="none">
    <rect x="1080" y="160" width="220" height="260"/>
    <line x1="1080" y1="200" x2="1300" y2="200"/>
    <line x1="1080" y1="240" x2="1300" y2="240"/>
    <line x1="1080" y1="280" x2="1300" y2="280"/>
    <line x1="1080" y1="320" x2="1300" y2="320"/>
    <line x1="1080" y1="360" x2="1300" y2="360"/>
    <line x1="1080" y1="400" x2="1300" y2="400"/>
    <line x1="1190" y1="160" x2="1190" y2="420"/>
  </g>

  <!-- THE JOURNAL label -->
  <text x="150" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#00B5E2" letter-spacing="6" font-weight="600">THE JOURNAL</text>

  <!-- Title -->
  <text x="150" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="78" fill="#ffffff" font-weight="700">Freight Bill Audit</text>
  <text x="150" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#cfe5f1" opacity="0.9" font-style="italic">Sampled review vs AI line-item review</text>

  <!-- Thematic visual: horizontal bar comparison of recovery range -->
  <g transform="translate(150, 520)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#7fb6d6" letter-spacing="4" font-weight="600">RECOVERED FREIGHT SPEND</text>

    <!-- Scale axis at top -->
    <line x1="0" y1="35" x2="1200" y2="35" stroke="#5e8aa6" stroke-width="1" opacity="0.3"/>
    <text x="0" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fb6d6" opacity="0.7">0%</text>
    <text x="290" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fb6d6" opacity="0.7">1%</text>
    <text x="590" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fb6d6" opacity="0.7">2%</text>
    <text x="890" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fb6d6" opacity="0.7">3%</text>
    <text x="1170" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fb6d6" opacity="0.7">4%</text>

    <!-- Sampled audit row -->
    <text x="0" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#cfe5f1">Sampled audit</text>
    <rect x="0" y="105" width="1200" height="46" fill="#0a3a66" rx="3" opacity="0.4"/>
    <rect x="90" y="105" width="210" height="46" fill="url(#sampledBar)" rx="3"/>
    <text x="320" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1" font-weight="600">0.3 to 1.0%</text>

    <!-- AI line-item audit row -->
    <text x="0" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#cfe5f1">AI line-item audit</text>
    <rect x="0" y="240" width="1200" height="46" fill="#0a3a66" rx="3" opacity="0.4"/>
    <rect x="450" y="240" width="600" height="46" fill="url(#aiBar)" rx="3"/>
    <text x="1070" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#cfe5f1" font-weight="600">1.5 to 3.5%</text>

    <!-- Footer caption -->
    <text x="0" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#7fb6d6" opacity="0.75" font-style="italic">Industry ranges, recoverable share of total freight spend</text>
  </g>

  <!-- Bottom-edge accent bar -->
  <rect x="0" y="994" width="1500" height="6" fill="url(#accentBar)"/>
</svg>
