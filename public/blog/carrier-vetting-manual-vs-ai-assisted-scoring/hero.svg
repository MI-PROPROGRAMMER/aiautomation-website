<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Carrier vetting manual reviews versus AI-assisted scoring">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.18" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="dialFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500"/>
    <path d="M0 360 H1500"/>
    <path d="M0 520 H1500"/>
    <path d="M0 680 H1500"/>
    <path d="M0 840 H1500"/>
  </g>

  <g transform="translate(180,230)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="90" font-size="84" font-weight="700" fill="#ffffff">Carrier Vetting</text>
    <text y="160" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">manual reviews vs AI-assisted scoring</text>
  </g>

  <g transform="translate(180,540)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">A SINGLE CARRIER, TWO WORKFLOWS</text>

    <g transform="translate(0,40)">
      <rect x="0" y="0" width="540" height="270" fill="#0a3a66" opacity="0.45" rx="6"/>
      <text x="22" y="38" font-size="18" fill="#9fc4dc" letter-spacing="2">MANUAL REVIEW</text>
      <text x="22" y="78" font-size="22" fill="#cfe5f1">FMCSA tab</text>
      <text x="22" y="112" font-size="22" fill="#cfe5f1">Insurance portal</text>
      <text x="22" y="146" font-size="22" fill="#cfe5f1">Fraud watch board</text>
      <text x="22" y="180" font-size="22" fill="#cfe5f1">TMS history lookup</text>
      <text x="22" y="214" font-size="22" fill="#cfe5f1">Identity phone check</text>
      <g transform="translate(22,232)">
        <rect x="0" y="0" width="496" height="18" fill="#0a3a66"/>
        <rect x="0" y="0" width="496" height="18" fill="#5e8aa6" opacity="0.7"/>
      </g>
      <text x="22" y="266" font-size="13" letter-spacing="2" fill="#7fb6d6">TIME TO DECISION  30 TO 90 MIN</text>
    </g>

    <g transform="translate(600,40)">
      <rect x="0" y="0" width="540" height="270" fill="#0a3a66" opacity="0.45" rx="6"/>
      <text x="22" y="38" font-size="18" fill="#9fc4dc" letter-spacing="2">AI-ASSISTED SCORE</text>

      <g transform="translate(22,72)">
        <text font-size="22" fill="#cfe5f1">Authority + insurance</text>
        <rect x="280" y="-18" width="220" height="22" fill="#0a3a66"/>
        <rect x="280" y="-18" width="210" height="22" fill="url(#dialFill)"/>
      </g>
      <g transform="translate(22,106)">
        <text font-size="22" fill="#cfe5f1">Safety + claims</text>
        <rect x="280" y="-18" width="220" height="22" fill="#0a3a66"/>
        <rect x="280" y="-18" width="180" height="22" fill="url(#dialFill)"/>
      </g>
      <g transform="translate(22,140)">
        <text font-size="22" fill="#cfe5f1">Identity match</text>
        <rect x="280" y="-18" width="220" height="22" fill="#0a3a66"/>
        <rect x="280" y="-18" width="200" height="22" fill="url(#dialFill)"/>
      </g>
      <g transform="translate(22,174)">
        <text font-size="22" fill="#cfe5f1">Double-broker risk</text>
        <rect x="280" y="-18" width="220" height="22" fill="#0a3a66"/>
        <rect x="280" y="-18" width="60" height="22" fill="url(#dialFill)"/>
      </g>

      <g transform="translate(22,206)">
        <rect x="0" y="0" width="496" height="18" fill="#0a3a66"/>
        <rect x="0" y="0" width="34" height="18" fill="url(#dialFill)"/>
      </g>
      <text x="22" y="240" font-size="13" letter-spacing="2" fill="#7fb6d6">TIME TO DECISION  UNDER 2 MIN</text>
    </g>

    <g transform="translate(0,340)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">SAME CARRIER  ·  SAME DATA  ·  THE DIFFERENCE IS WHERE THE COORDINATOR'S ATTENTION GOES</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
