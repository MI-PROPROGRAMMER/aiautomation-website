<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Spot Re-Coverage Timeline visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="pressure" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500"/><path d="M0 380 H1500"/><path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/><path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,235)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Spot Re-Coverage</text>
    <text y="170" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">when a carrier goes dark on a spot load</text>
  </g>

  <g font-family="Georgia, serif">
    <text x="180" y="555" font-size="14" letter-spacing="3" fill="#7fb6d6">THE RE-COVERAGE CLOCK</text>

    <rect x="180" y="600" width="1140" height="10" fill="#0a3a66"/>
    <rect x="180" y="600" width="1140" height="10" fill="url(#pressure)"/>

    <g stroke="#5e8aa6" stroke-width="1">
      <line x1="180"  y1="595" x2="180"  y2="630"/>
      <line x1="465"  y1="595" x2="465"  y2="630"/>
      <line x1="655"  y1="595" x2="655"  y2="630"/>
      <line x1="1130" y1="595" x2="1130" y2="630"/>
      <line x1="1320" y1="595" x2="1320" y2="630"/>
    </g>

    <g font-size="13" fill="#9fc4dc" letter-spacing="1.5" text-anchor="middle">
      <text x="180"  y="654">T-90</text>
      <text x="465"  y="654">T-60</text>
      <text x="655"  y="654">T-45</text>
      <text x="1130" y="654">T-15</text>
      <text x="1320" y="654">T+0</text>
    </g>

    <g font-size="14" fill="#cfe5f1" text-anchor="middle">
      <text x="180"  y="525" font-weight="700" fill="#ffffff">BOOKED</text>
      <text x="465"  y="525" font-weight="700" fill="#ffffff">CARRIER DARK</text>
      <text x="655"  y="525" font-weight="700" fill="#ffffff">SEARCH OPENS</text>
      <text x="1130" y="525" font-weight="700" fill="#ffffff">REPLACEMENT BOOKED</text>
      <text x="1320" y="525" font-weight="700" fill="#00B5E2">APPOINTMENT</text>

      <text x="180"  y="496" font-size="12" fill="#7fb6d6" letter-spacing="2">CONFIRMED COVER</text>
      <text x="465"  y="496" font-size="12" fill="#7fb6d6" letter-spacing="2">DISPATCHER SILENT</text>
      <text x="655"  y="496" font-size="12" fill="#7fb6d6" letter-spacing="2">DESK LEAD PULLED IN</text>
      <text x="1130" y="496" font-size="12" fill="#7fb6d6" letter-spacing="2">RATE +18 TO 30%</text>
      <text x="1320" y="496" font-size="12" fill="#7fb6d6" letter-spacing="2">SHIPPER WAITING</text>
    </g>

    <g fill="#00B5E2">
      <circle cx="180"  cy="605" r="9"/>
      <circle cx="465"  cy="605" r="9" fill="#cfe5f1"/>
      <circle cx="655"  cy="605" r="9" fill="#7fb6d6"/>
      <circle cx="1130" cy="605" r="9"/>
      <circle cx="1320" cy="605" r="11" fill="none" stroke="#00B5E2" stroke-width="3"/>
    </g>

    <g transform="translate(180,720)">
      <text font-size="14" letter-spacing="3" fill="#7fb6d6">COST STACK ON A SINGLE NO-SHOW LOAD</text>

      <g transform="translate(0,40)">
        <text font-size="14" fill="#9fc4dc">RE-COVER MARGIN</text>
        <rect x="270" y="-14" width="800" height="14" fill="#0a3a66"/>
        <rect x="270" y="-14" width="640" height="14" fill="#00B5E2" opacity="0.95"/>
        <text x="1090" y="0" font-size="13" fill="#cfe5f1">premium paid</text>
      </g>

      <g transform="translate(0,72)">
        <text font-size="14" fill="#9fc4dc">SENIOR REP TIME</text>
        <rect x="270" y="-14" width="800" height="14" fill="#0a3a66"/>
        <rect x="270" y="-14" width="540" height="14" fill="#00B5E2" opacity="0.78"/>
        <text x="1090" y="0" font-size="13" fill="#cfe5f1">60 to 120 min</text>
      </g>

      <g transform="translate(0,104)">
        <text font-size="14" fill="#9fc4dc">SHIPPER SCORECARD</text>
        <rect x="270" y="-14" width="800" height="14" fill="#0a3a66"/>
        <rect x="270" y="-14" width="380" height="14" fill="#00B5E2" opacity="0.62"/>
        <text x="1090" y="0" font-size="13" fill="#cfe5f1">on-time hit</text>
      </g>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
