<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Trade buyout overruns eroding GC job margin">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.24" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bought-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500"/><path d="M0 360 H1500"/><path d="M0 520 H1500"/>
    <path d="M0 680 H1500"/><path d="M0 840 H1500"/>
  </g>

  <g transform="translate(160,225)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="24" letter-spacing="6" fill="#00B5E2" opacity="0.9">THE JOURNAL</text>
    <text y="105" font-size="82" font-weight="700" fill="#ffffff">When Trade Buyout Overruns</text>
    <text y="195" font-size="82" font-weight="700" fill="#ffffff">Erode GC Job Margin</text>
    <text y="260" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9" font-style="italic">The estimate to bought-price drift on mid-sized commercial jobs</text>
  </g>

  <g transform="translate(180,610)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">ESTIMATE VS BOUGHT · BY TRADE PACKAGE</text>

    <g transform="translate(0,20)">
      <line x1="0" y1="200" x2="1180" y2="200" stroke="#5e8aa6" stroke-width="1" opacity="0.6"/>

      <!-- Concrete -->
      <g transform="translate(30,0)">
        <rect x="0" y="130" width="52" height="70" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="112" width="52" height="88" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">Concrete</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+2%</text>
      </g>

      <!-- Steel -->
      <g transform="translate(200,0)">
        <rect x="0" y="118" width="52" height="82" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="94" width="52" height="106" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">Steel</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+3%</text>
      </g>

      <!-- MEP -->
      <g transform="translate(370,0)">
        <rect x="0" y="52" width="52" height="148" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="14" width="52" height="186" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">MEP</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+4%</text>
      </g>

      <!-- Drywall -->
      <g transform="translate(540,0)">
        <rect x="0" y="140" width="52" height="60" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="124" width="52" height="76" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">Drywall</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+2%</text>
      </g>

      <!-- Finishes -->
      <g transform="translate(710,0)">
        <rect x="0" y="128" width="52" height="72" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="98" width="52" height="102" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">Finishes</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+5%</text>
      </g>

      <!-- Sitework -->
      <g transform="translate(880,0)">
        <rect x="0" y="146" width="52" height="54" fill="#7fb6d6" opacity="0.55"/>
        <rect x="60" y="124" width="52" height="76" fill="url(#bought-fill)"/>
        <text x="56" y="228" text-anchor="middle" fill="#cfe5f1" font-size="18">Sitework</text>
        <text x="56" y="250" text-anchor="middle" fill="#7fb6d6" font-size="14">+3%</text>
      </g>

      <!-- Legend -->
      <g transform="translate(1030,10)">
        <rect x="0" y="0" width="26" height="14" fill="#7fb6d6" opacity="0.55"/>
        <text x="34" y="12" fill="#cfe5f1" font-size="18">Estimate</text>
        <rect x="0" y="30" width="26" height="14" fill="url(#bought-fill)"/>
        <text x="34" y="42" fill="#cfe5f1" font-size="18">Bought</text>
      </g>
    </g>

    <text x="0" y="290" font-size="12" letter-spacing="2" fill="#5e8aa6">ROLLED-UP DRIFT 2% TO 4% OF HARD COST · OFTEN THE FULL GC FEE</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
