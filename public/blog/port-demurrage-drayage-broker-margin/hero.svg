<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Port demurrage and drayage margin visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.78" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="containerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#062a4d"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.4">
    <path d="M0 200 H1500" /><path d="M0 360 H1500" /><path d="M0 520 H1500" />
    <path d="M0 680 H1500" /><path d="M0 840 H1500" />
  </g>

  <g transform="translate(180,250)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Port Demurrage</text>
    <text y="170" font-size="40" font-weight="400" fill="#cfe5f1" opacity="0.9">the drayage margin leak that hides on the appointment</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">FREE-TIME CLOCK · PER-CONTAINER COST CURVE</text>

    <g transform="translate(0,40)">
      <line x1="0" y1="220" x2="1140" y2="220" stroke="#5e8aa6" stroke-width="1.5"/>
      <line x1="0" y1="220" x2="0" y2="20" stroke="#5e8aa6" stroke-width="1.5"/>

      <text x="-8" y="225" font-size="12" fill="#7fb6d6" text-anchor="end">$0</text>
      <text x="-8" y="155" font-size="12" fill="#7fb6d6" text-anchor="end">$500</text>
      <text x="-8" y="90" font-size="12" fill="#7fb6d6" text-anchor="end">$1.5K</text>
      <text x="-8" y="30" font-size="12" fill="#7fb6d6" text-anchor="end">$3K+</text>

      <text x="120" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">FREE</text>
      <text x="360" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">DAY 1-5</text>
      <text x="660" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">DAY 6-10</text>
      <text x="980" y="240" font-size="12" fill="#7fb6d6" text-anchor="middle">DAY 11+</text>

      <rect x="40" y="218" width="160" height="2" fill="#5e8aa6" opacity="0.5"/>
      <line x1="200" y1="218" x2="240" y2="200" stroke="#00B5E2" stroke-width="3" opacity="0.6"/>

      <path d="M240 200 Q360 170 480 145" stroke="#00B5E2" stroke-width="3" fill="none" opacity="0.75"/>
      <path d="M480 145 Q600 110 760 70" stroke="#00B5E2" stroke-width="3" fill="none" opacity="0.85"/>
      <path d="M760 70 Q880 45 1080 25" stroke="#00B5E2" stroke-width="3" fill="none" opacity="0.95"/>

      <circle cx="200" cy="218" r="5" fill="#00B5E2"/>
      <circle cx="480" cy="145" r="5" fill="#00B5E2"/>
      <circle cx="760" cy="70" r="5" fill="#00B5E2"/>
      <circle cx="1080" cy="25" r="5" fill="#00B5E2"/>

      <text x="240" y="195" font-size="13" fill="#cfe5f1" opacity="0.85">$150/day</text>
      <text x="500" y="135" font-size="13" fill="#cfe5f1" opacity="0.9">$300/day</text>
      <text x="780" y="60" font-size="13" fill="#cfe5f1" opacity="0.95">$500/day</text>
      <text x="930" y="20" font-size="13" fill="#ffffff" font-weight="600">margin erased</text>
    </g>

    <g transform="translate(1230,40)">
      <text font-size="13" letter-spacing="2" fill="#7fb6d6">CONTAINER STACK</text>
      <g transform="translate(0,20)">
        <rect x="0" y="0" width="180" height="38" fill="url(#containerFill)" stroke="#0a3a66"/>
        <rect x="0" y="42" width="180" height="38" fill="url(#containerFill)" stroke="#0a3a66"/>
        <rect x="0" y="84" width="180" height="38" fill="#00B5E2" opacity="0.85" stroke="#00B5E2"/>
        <rect x="0" y="126" width="180" height="38" fill="url(#containerFill)" stroke="#0a3a66"/>
        <rect x="0" y="168" width="180" height="38" fill="url(#containerFill)" stroke="#0a3a66"/>

        <line x1="6" y1="19" x2="174" y2="19" stroke="#5e8aa6" stroke-width="0.5" opacity="0.4"/>
        <line x1="6" y1="61" x2="174" y2="61" stroke="#5e8aa6" stroke-width="0.5" opacity="0.4"/>
        <line x1="6" y1="103" x2="174" y2="103" stroke="#001a36" stroke-width="0.5" opacity="0.6"/>
        <line x1="6" y1="145" x2="174" y2="145" stroke="#5e8aa6" stroke-width="0.5" opacity="0.4"/>
        <line x1="6" y1="187" x2="174" y2="187" stroke="#5e8aa6" stroke-width="0.5" opacity="0.4"/>

        <text x="190" y="108" font-size="12" fill="#00B5E2">past free time</text>
      </g>
    </g>

    <g transform="translate(0,330)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">PER-CONTAINER COST AFTER FREE TIME EXPIRES · DEMURRAGE COMPOUNDS, MARGIN DOES NOT</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
