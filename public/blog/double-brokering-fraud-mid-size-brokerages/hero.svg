<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Carrier verification cadence comparison, manual desk vs AI augmented desk">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500" /><path d="M0 360 H1500" /><path d="M0 520 H1500" />
    <path d="M0 680 H1500" /><path d="M0 840 H1500" />
  </g>

  <g transform="translate(180,240)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="80" font-weight="700" fill="#ffffff">Verify Every Load</text>
    <text y="168" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">why double-brokering slips past mid-size desks</text>
  </g>

  <g transform="translate(180,560)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">CARRIER VERIFICATION CADENCE, 100 CONSECUTIVE LOADS</text>

    <g transform="translate(0,60)">
      <text font-size="15" fill="#9fc4dc">MANUAL DESK</text>
      <line x1="240" y1="-8" x2="1120" y2="-8" stroke="#0a3a66" stroke-width="2"/>
      <circle cx="248" cy="-8" r="10" fill="#00B5E2"/>
      <text x="248" y="18" font-size="11" fill="#7fb6d6" text-anchor="middle">ONBOARD</text>
      <text x="1150" y="-3" font-size="14" fill="#cfe5f1">1 check</text>
    </g>

    <g transform="translate(0,150)">
      <text font-size="15" fill="#9fc4dc">AI-AUGMENTED DESK</text>
      <line x1="240" y1="-8" x2="1120" y2="-8" stroke="#0a3a66" stroke-width="2"/>
      <g fill="#00B5E2">
        <circle cx="248" cy="-8" r="6"/>
        <circle cx="292" cy="-8" r="6"/>
        <circle cx="336" cy="-8" r="6"/>
        <circle cx="380" cy="-8" r="6"/>
        <circle cx="424" cy="-8" r="6"/>
        <circle cx="468" cy="-8" r="6"/>
        <circle cx="512" cy="-8" r="6"/>
        <circle cx="556" cy="-8" r="6"/>
        <circle cx="600" cy="-8" r="6"/>
        <circle cx="644" cy="-8" r="6"/>
        <circle cx="688" cy="-8" r="6"/>
        <circle cx="732" cy="-8" r="6"/>
        <circle cx="776" cy="-8" r="6"/>
        <circle cx="820" cy="-8" r="6"/>
        <circle cx="864" cy="-8" r="6"/>
        <circle cx="908" cy="-8" r="6"/>
        <circle cx="952" cy="-8" r="6"/>
        <circle cx="996" cy="-8" r="6"/>
        <circle cx="1040" cy="-8" r="6"/>
        <circle cx="1084" cy="-8" r="6"/>
      </g>
      <text x="1150" y="-3" font-size="14" fill="#cfe5f1">every load</text>
    </g>

    <g transform="translate(0,240)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">SAME QUEUE, VERIFICATION RUNS PER TENDER INSTEAD OF ONCE AT SIGNUP</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
