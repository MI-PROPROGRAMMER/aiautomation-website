<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Rate confirmation margin leak visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1500" /><path d="M0 360 H1500" /><path d="M0 520 H1500" />
    <path d="M0 680 H1500" /><path d="M0 840 H1500" />
  </g>

  <g transform="translate(180,240)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">The Rate Con Leak</text>
    <text y="170" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">where broker margin slips before dispatch</text>
  </g>

  <g transform="translate(180,540)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">MARGIN SURVIVAL BY RATE-CON STAGE</text>

    <g transform="translate(0,50)">
      <text font-size="14" fill="#9fc4dc">QUOTED</text>
      <rect x="220" y="-14" width="900" height="18" fill="#0a3a66"/>
      <rect x="220" y="-14" width="900" height="18" fill="#00B5E2" opacity="0.95"/>
      <text x="1140" y="0" font-size="14" fill="#cfe5f1">100%</text>
    </g>

    <g transform="translate(0,95)">
      <text font-size="14" fill="#9fc4dc">AFTER RATE MISMATCH</text>
      <rect x="220" y="-14" width="900" height="18" fill="#0a3a66"/>
      <rect x="220" y="-14" width="702" height="18" fill="#00B5E2" opacity="0.85"/>
      <text x="1140" y="0" font-size="14" fill="#cfe5f1">78%</text>
    </g>

    <g transform="translate(0,140)">
      <text font-size="14" fill="#9fc4dc">AFTER ACCESSORIAL MISS</text>
      <rect x="220" y="-14" width="900" height="18" fill="#0a3a66"/>
      <rect x="220" y="-14" width="504" height="18" fill="#00B5E2" opacity="0.75"/>
      <text x="1140" y="0" font-size="14" fill="#cfe5f1">56%</text>
    </g>

    <g transform="translate(0,185)">
      <text font-size="14" fill="#9fc4dc">AFTER FUEL LAG</text>
      <rect x="220" y="-14" width="900" height="18" fill="#0a3a66"/>
      <rect x="220" y="-14" width="378" height="18" fill="#00B5E2" opacity="0.65"/>
      <text x="1140" y="0" font-size="14" fill="#cfe5f1">42%</text>
    </g>

    <g transform="translate(0,230)">
      <text font-size="14" fill="#9fc4dc">SETTLED MARGIN</text>
      <rect x="220" y="-14" width="900" height="18" fill="#0a3a66"/>
      <rect x="220" y="-14" width="315" height="18" fill="#00B5E2" opacity="0.55"/>
      <text x="1140" y="0" font-size="14" fill="#cfe5f1">35%</text>
    </g>

    <g transform="translate(0,285)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">FOUR SMALL ERRORS COMPOUND INTO A TWO-THIRDS MARGIN HAIRCUT</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
