<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Manual vs AI-augmented order exception handling visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="aiNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0a3a66" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.35">
    <path d="M0 220 H1500" /><path d="M0 400 H1500" /><path d="M0 580 H1500" />
    <path d="M0 760 H1500" />
  </g>

  <g transform="translate(180,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Manual vs AI Triage</text>
    <text y="170" font-size="38" font-weight="400" fill="#cfe5f1" opacity="0.9">order exceptions on a DTC ops desk</text>
  </g>

  <g font-family="Georgia, serif">
    <text x="180" y="540" font-size="14" letter-spacing="3" fill="#7fb6d6">EXCEPTIONS IN</text>

    <g transform="translate(180,560)">
      <rect x="0" y="0" width="240" height="46" rx="6" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1"/>
      <text x="20" y="29" font-size="18" fill="#cfe5f1">Address fixes</text>
    </g>
    <g transform="translate(180,616)">
      <rect x="0" y="0" width="240" height="46" rx="6" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1"/>
      <text x="20" y="29" font-size="18" fill="#cfe5f1">Fraud holds</text>
    </g>
    <g transform="translate(180,672)">
      <rect x="0" y="0" width="240" height="46" rx="6" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1"/>
      <text x="20" y="29" font-size="18" fill="#cfe5f1">WISMO tickets</text>
    </g>
    <g transform="translate(180,728)">
      <rect x="0" y="0" width="240" height="46" rx="6" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1"/>
      <text x="20" y="29" font-size="18" fill="#cfe5f1">Refunds in policy</text>
    </g>
    <g transform="translate(180,784)">
      <rect x="0" y="0" width="240" height="46" rx="6" fill="#0a3a66" stroke="#5e8aa6" stroke-width="1"/>
      <text x="20" y="29" font-size="18" fill="#cfe5f1">Subscription changes</text>
    </g>

    <g stroke="#00B5E2" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M420 583 C 540 583, 600 700, 720 700"/>
      <path d="M420 639 C 540 639, 600 700, 720 700"/>
      <path d="M420 695 C 540 695, 600 700, 720 700"/>
      <path d="M420 751 C 540 751, 600 700, 720 700"/>
      <path d="M420 807 C 540 807, 600 700, 720 700"/>
    </g>

    <g transform="translate(720,610)">
      <rect x="0" y="0" width="220" height="180" rx="14" fill="url(#aiNode)" stroke="#00B5E2" stroke-width="1.5"/>
      <text x="110" y="80" text-anchor="middle" font-size="22" letter-spacing="3" fill="#ffffff" font-weight="700">AI TRIAGE</text>
      <text x="110" y="115" text-anchor="middle" font-size="14" fill="#cfe5f1" opacity="0.9">classify · enrich · act</text>
    </g>

    <g stroke="#00B5E2" stroke-width="1.5" fill="none" opacity="0.85">
      <path d="M940 660 C 1020 660, 1040 615, 1120 615"/>
      <path d="M940 740 C 1020 740, 1040 800, 1120 800"/>
    </g>

    <g transform="translate(1120,580)">
      <rect x="0" y="0" width="240" height="68" rx="8" fill="#00B5E2" opacity="0.95"/>
      <text x="20" y="30" font-size="14" letter-spacing="2" fill="#001a36" font-weight="700">AUTO-RESOLVED</text>
      <text x="20" y="56" font-size="22" fill="#001a36" font-weight="700">routine 50–70%</text>
    </g>
    <g transform="translate(1120,768)">
      <rect x="0" y="0" width="240" height="56" rx="8" fill="#0a3a66" stroke="#7fb6d6" stroke-width="1"/>
      <text x="20" y="24" font-size="13" letter-spacing="2" fill="#7fb6d6">HUMAN ESCALATION</text>
      <text x="20" y="46" font-size="18" fill="#cfe5f1">ambiguous cases only</text>
    </g>

    <text x="180" y="870" font-size="13" letter-spacing="3" fill="#5e8aa6">FROM MANUAL QUEUE TO AGENT-FIRST EXCEPTION DESK</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
