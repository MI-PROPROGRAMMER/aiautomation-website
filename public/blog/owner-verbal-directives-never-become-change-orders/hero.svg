<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Owner verbal directives absorbed off the GC change order log">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.65">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="logFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fb6d6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5e8aa6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="absorbedFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.3">
    <path d="M0 220 H1500"/>
    <path d="M0 400 H1500"/>
    <path d="M0 580 H1500"/>
    <path d="M0 760 H1500"/>
  </g>

  <g transform="translate(180,220)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="72" font-weight="700" fill="#ffffff">Owner Verbal Directives</text>
    <text y="180" font-size="72" font-weight="700" fill="#ffffff">That Never Become COs</text>
    <text y="238" font-size="32" font-weight="400" fill="#cfe5f1" opacity="0.9">the absorbed-scope leak on mid-size GC jobs</text>
  </g>

  <g transform="translate(180,610)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">DIRECTIVES PER $12M MID-SIZE GC JOB (ILLUSTRATIVE)</text>

    <g transform="translate(120,220)">
      <rect x="0" y="-140" width="180" height="140" fill="url(#logFill)"/>
      <text x="90" y="-152" font-size="28" font-weight="700" fill="#cfe5f1" text-anchor="middle">~10</text>
      <text x="90" y="34" font-size="16" letter-spacing="2" fill="#9fc4dc" text-anchor="middle">LOGGED AS CO</text>
    </g>

    <g transform="translate(380,220)">
      <rect x="0" y="-210" width="180" height="210" fill="url(#absorbedFill)"/>
      <text x="90" y="-222" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">~40</text>
      <text x="90" y="34" font-size="16" letter-spacing="2" fill="#cfe5f1" text-anchor="middle">ABSORBED SILENTLY</text>
    </g>

    <g transform="translate(700,220)" opacity="0.95">
      <line x1="0" y1="0" x2="380" y2="0" stroke="#5e8aa6" stroke-width="1" opacity="0.4"/>
      <text x="0" y="-160" font-size="18" fill="#cfe5f1">MEP, low-voltage, interior finish</text>
      <text x="0" y="-128" font-size="18" fill="#cfe5f1">trades absorb most of the</text>
      <text x="0" y="-96" font-size="18" fill="#cfe5f1">directive volume, and the fee</text>
      <text x="0" y="-64" font-size="18" fill="#cfe5f1">is left on the table.</text>
      <text x="0" y="-14" font-size="14" letter-spacing="2" fill="#00B5E2">PATTERN</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
