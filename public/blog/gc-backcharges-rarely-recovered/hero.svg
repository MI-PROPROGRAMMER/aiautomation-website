<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Why GC Backcharges Rarely Get Recovered in Full">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002347"/>
      <stop offset="100%" stop-color="#001a36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2"/>
      <stop offset="60%" stop-color="#7fb6d6"/>
      <stop offset="100%" stop-color="#0a3a66"/>
    </linearGradient>
    <linearGradient id="filedBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B5E2"/>
      <stop offset="100%" stop-color="#5e8aa6"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>

  <text x="120" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#00B5E2" letter-spacing="6">THE JOURNAL</text>

  <text x="120" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="bold" fill="#ffffff">Why GC Backcharges</text>
  <text x="120" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="bold" fill="#ffffff">Rarely Get Recovered</text>
  <text x="120" y="480" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="bold" fill="#ffffff">in Full</text>

  <text x="120" y="555" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#cfe5f1" opacity="0.9">What slips between filing and closeout, and what changes</text>
  <text x="120" y="600" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#cfe5f1" opacity="0.9">when AI handles the paperwork.</text>

  <g transform="translate(120, 670)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#cfe5f1" letter-spacing="4" opacity="0.85">FILED VALUE</text>
    <rect x="0" y="20" width="1100" height="34" fill="url(#filedBar)" rx="3"/>
    <text x="1120" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#ffffff">$1.00</text>

    <text x="0" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#cfe5f1" letter-spacing="4" opacity="0.85">TYPICAL RECOVERY</text>
    <rect x="0" y="120" width="1100" height="34" fill="#0a3a66" rx="3"/>
    <rect x="0" y="120" width="440" height="34" fill="#00B5E2" rx="3"/>
    <text x="460" y="146" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#ffffff">$0.30 to $0.50</text>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accent)"/>
</svg>
