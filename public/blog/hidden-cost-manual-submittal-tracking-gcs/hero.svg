<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="The hidden cost of manual submittal tracking — pipeline visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="manualBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a3a66"/>
      <stop offset="1" stop-color="#5e8aa6"/>
    </linearGradient>
    <linearGradient id="aiBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.4">
    <path d="M0 220 H1500"/><path d="M0 380 H1500"/><path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/><path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,200)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="78" font-weight="700" fill="#ffffff">The Hidden Cost of</text>
    <text y="184" font-size="78" font-weight="700" fill="#ffffff">Manual Submittal Tracking</text>
    <text y="252" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">where commercial GCs lose schedule weeks they never see</text>
  </g>

  <g transform="translate(180,620)" font-family="Georgia, serif">
    <text font-size="14" letter-spacing="3" fill="#7fb6d6">SUBMITTAL APPROVAL CYCLE — DAYS PER STAGE</text>

    <g transform="translate(0,40)">
      <text font-size="13" letter-spacing="2" fill="#9fc4dc">SUB → GC</text>
      <rect x="180" y="-14" width="940" height="14" fill="#0a3a66" opacity="0.45"/>
      <rect x="180" y="-14" width="180" height="14" fill="url(#manualBar)"/>
      <rect x="180" y="4" width="60" height="10" fill="url(#aiBar)"/>
      <text x="1140" y="-2" font-size="13" fill="#cfe5f1">3d / 1d</text>
    </g>

    <g transform="translate(0,82)">
      <text font-size="13" letter-spacing="2" fill="#9fc4dc">GC REVIEW</text>
      <rect x="180" y="-14" width="940" height="14" fill="#0a3a66" opacity="0.45"/>
      <rect x="180" y="-14" width="320" height="14" fill="url(#manualBar)"/>
      <rect x="180" y="4" width="100" height="10" fill="url(#aiBar)"/>
      <text x="1140" y="-2" font-size="13" fill="#cfe5f1">5d / 2d</text>
    </g>

    <g transform="translate(0,124)">
      <text font-size="13" letter-spacing="2" fill="#9fc4dc">ARCHITECT</text>
      <rect x="180" y="-14" width="940" height="14" fill="#0a3a66" opacity="0.45"/>
      <rect x="180" y="-14" width="640" height="14" fill="url(#manualBar)"/>
      <rect x="180" y="4" width="280" height="10" fill="url(#aiBar)"/>
      <text x="1140" y="-2" font-size="13" fill="#cfe5f1">12d / 6d</text>
    </g>

    <g transform="translate(0,166)">
      <text font-size="13" letter-spacing="2" fill="#9fc4dc">REVISIONS</text>
      <rect x="180" y="-14" width="940" height="14" fill="#0a3a66" opacity="0.45"/>
      <rect x="180" y="-14" width="420" height="14" fill="url(#manualBar)"/>
      <rect x="180" y="4" width="120" height="10" fill="url(#aiBar)"/>
      <text x="1140" y="-2" font-size="13" fill="#cfe5f1">7d / 2d</text>
    </g>

    <g transform="translate(0,208)">
      <text font-size="12" letter-spacing="2" fill="#5e8aa6">DARK BAR: MANUAL LOG · CYAN BAR: AI-ASSISTED DESK</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
