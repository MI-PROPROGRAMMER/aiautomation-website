<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="Out-of-stock pages and the DTC conversion spillover visualization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001a36"/>
      <stop offset="1" stop-color="#002347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B5E2" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#00B5E2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00B5E2" stop-opacity="0.0"/>
    </linearGradient>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#00B5E2"/>
    </marker>
    <marker id="arrowMute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7fb6d6"/>
    </marker>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <g stroke="#0a3a66" stroke-width="1" opacity="0.32">
    <path d="M0 220 H1500"/>
    <path d="M0 380 H1500"/>
    <path d="M0 540 H1500"/>
    <path d="M0 700 H1500"/>
    <path d="M0 860 H1500"/>
  </g>

  <g transform="translate(180,250)" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="22" letter-spacing="6" fill="#00B5E2" opacity="0.85">THE JOURNAL</text>
    <text y="100" font-size="84" font-weight="700" fill="#ffffff">Out-of-Stock Pages</text>
    <text y="170" font-size="36" font-weight="400" fill="#cfe5f1" opacity="0.9">where the lost order rarely stops at the missed SKU</text>
  </g>

  <g font-family="Georgia, serif">
    <g transform="translate(280,540)">
      <rect x="0" y="0" width="240" height="280" rx="6" fill="#0a3a66" stroke="#7fb6d6" stroke-opacity="0.45" stroke-width="1.5"/>
      <rect x="20" y="20" width="200" height="140" rx="3" fill="#001a36" stroke="#5e8aa6" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="20" y1="20" x2="220" y2="160" stroke="#00B5E2" stroke-width="2" opacity="0.7"/>
      <line x1="220" y1="20" x2="20" y2="160" stroke="#00B5E2" stroke-width="2" opacity="0.4"/>
      <rect x="40" y="180" width="160" height="32" rx="3" fill="#00B5E2"/>
      <text x="120" y="202" text-anchor="middle" font-size="16" font-weight="700" fill="#001a36" letter-spacing="2">OUT OF STOCK</text>
      <text x="20" y="240" font-size="16" fill="#cfe5f1" opacity="0.65">SKU 84-OC-2 · $128</text>
      <text x="20" y="262" font-size="13" fill="#7fb6d6" opacity="0.85">notify when back in stock</text>
    </g>

    <g transform="translate(280,852)">
      <text font-size="14" letter-spacing="3" fill="#5e8aa6">A SOLD-OUT PDP · PAID, EMAIL, OR ORGANIC ARRIVAL</text>
    </g>

    <path d="M520 600 C 640 580, 740 560, 850 560" stroke="#00B5E2" stroke-width="2" fill="none" opacity="0.85" marker-end="url(#arrowCyan)"/>
    <g transform="translate(870,548)">
      <text font-size="13" letter-spacing="3" fill="#00B5E2">EXIT 1</text>
      <text y="24" font-size="24" font-weight="700" fill="#ffffff">Competitor tab</text>
      <text y="52" font-size="15" fill="#cfe5f1" opacity="0.85">Full order lost, plus the customer</text>
    </g>

    <path d="M520 680 H 850" stroke="#7fb6d6" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#arrowMute)"/>
    <g transform="translate(870,668)">
      <text font-size="13" letter-spacing="3" fill="#7fb6d6">EXIT 2</text>
      <text y="24" font-size="24" font-weight="700" fill="#ffffff">Restock alert (late)</text>
      <text y="52" font-size="15" fill="#cfe5f1" opacity="0.85">Partial recovery, weeks delayed</text>
    </g>

    <path d="M520 760 C 640 780, 740 800, 850 800" stroke="#7fb6d6" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#arrowMute)"/>
    <g transform="translate(870,788)">
      <text font-size="13" letter-spacing="3" fill="#7fb6d6">EXIT 3</text>
      <text y="24" font-size="24" font-weight="700" fill="#ffffff">Abandoned session</text>
      <text y="52" font-size="15" fill="#cfe5f1" opacity="0.85">Recovery only via paid retargeting</text>
    </g>
  </g>

  <rect x="0" y="994" width="1500" height="6" fill="url(#accentLine)"/>
</svg>
